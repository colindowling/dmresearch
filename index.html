ly terminations by client."], ["5", "Placement quality patterns", "Synthesizes worker qualification data, ATS screening patterns, and placement tenure outcomes to identify which worker characteristics predict long-term placement success in which job types."], ["6", "Revenue concentration risk analysis", "Tracks client revenue concentration over time. Identifies when the top 3 clients represent more than 40% of revenue — a concentration level that creates existential risk if any one client reduces volume."]], "model": [["Entry price", "$4,000/mo for firms doing $20M-$50M in revenue. At a $30M firm running 18% gross margin, this protects $5.4M in gross profit for $48K/year — 0.9% of gross profit."], ["Scale pricing", "$5,000-$8,000/mo for firms doing $50M-$150M. Scales with recruiter count and client portfolio complexity, not just revenue."], ["Delivery", "Monthly intelligence brief + weekly client health flash. The weekly flash is a single-page update on any client relationships that have moved to elevated risk status — delivered every Monday."], ["Onboarding", "ATS + billing system data connection. Bullhorn, JobDiva, Avionte, and TempWorks all have API access. 2-3 week setup. First insights at day 21."], ["Human layer", "One senior analyst per 8-10 staffing firm clients. Staffing industry operations background required — former branch manager, VP of operations, or staffing industry consultant."], ["Unit economics", "12 clients x $5,500/mo = $66K MRR / $792K ARR. Lower average revenue than healthcare or manufacturing, but faster sales cycles and lower onboarding cost. Gross margin: 66-70%."]], "risks": ["Staffing firms think in margin points, not service cost. Price in the context of protected gross margin: $48K/year to protect $5.4M in gross margin lands very differently than $4,000/month for intelligence services.", "ATS data quality varies significantly. Some staffing firms use their ATS inconsistently — recruiters skip fields, use different codes for the same events. Build a data quality assessment into your onboarding pitch.", "The buyer is the CEO or COO, not the recruiter. Recruiters will be suspicious that you are measuring them. Frame your approach as supporting executive strategic decisions."], "comp": [["Bullhorn, JobDiva (ATS vendors)", "Applicant tracking + reporting dashboards", "Capture placement data beautifully. Produce standard reports. No synthesis layer, no narrative, no forward-looking client health intelligence.", false], ["Staffing industry consultants", "Operational improvement and strategic consulting", "Periodic engagements at $25K-$75K. Observation-based. No continuous data synthesis.", false], ["Staffing Industry Analysts (SIA)", "Industry benchmarking and research", "Provide industry-level benchmarking. Do not synthesize the firm own operational data into specific intelligence about their client relationships.", false], ["You", "Continuous ATS + billing synthesis -> client health + margin intelligence", "No dashboards. No logins. A staffing industry veteran reads your ATS and billing data continuously and delivers what it means — which clients are at risk, which margins are understated, which recruiters produce the best placements.", true]], "gtm": [["Target firms that recently lost a major client", "A staffing firm that just lost a top-3 client is maximally receptive to a client health monitoring service. The emotional stakes are high and the ROI argument is immediate."], ["Free client concentration risk audit as door-opener", "Pull 12 months of billing data and produce a client concentration analysis: the top 5 clients as a % of revenue, their trend over time, and early warning signals for the top 3."], ["Staffing industry associations and conferences", "SIA Executive Forum, ASA Staffing World, and regional staffing association events are your channels."], ["Bullhorn and ATS vendor partner relationships", "Bullhorn, JobDiva, and Avionte have agency partner programs. A relationship as an analytics partner generates inbound from exactly the firms you want."], ["Frame the pitch around the cost of losing a client", "Losing a top-5 client typically costs a firm of your size $800K-$2M in annual revenue. Our service identifies client attrition risk 90 days before it becomes a loss. At $48K/year, the ROI on preventing one client loss is 17-40x."]], "milestones": "<strong>Month 1-3:</strong> Bullhorn and Avionte integrations. Run 2 free client concentration audits. Target first 2 paid clients.<br><br><strong>Month 3-6:</strong> 5 clients. Deliver first monthly briefs and weekly client health flashes. Target $22-35K MRR.<br><br><strong>Month 6-9:</strong> 8-10 clients. Build Bullhorn partner relationship. Target $48-65K MRR.<br><br><strong>Month 9-12:</strong> 12-15 clients. Second analyst hire. Target $72-90K MRR."}, {"id": "property", "rank": 8, "tier": 2, "name": "Property management — commercial & residential", "confirmed": false, "hook": "Maintenance logs, lease renewal rates, tenant behavior, vendor performance, and utility data sit in property management software completely unread at the portfolio level.", "scores": {"data": 86, "gap": 88, "pays": 80, "density": 84}, "stats": [["300K+", "US property management companies"], ["2K-50K units", "Your ICP portfolio size"], ["$88B", "US property management revenue"]], "sweet": "PE-backed or institutionally-owned property management firms managing 2,000-50,000 residential or commercial units. The analytics infrastructure is almost always limited to the reporting dashboards built into Yardi, AppFolio, or MRI.", "why": [["Insurance and operating cost inflation is squeezing NOI", "Property insurance costs have increased 25-50% in many markets since 2022. Maintenance costs, utilities, and management labor are all up significantly. Operators who identify which properties have disproportionate operating cost growth have a significant NOI management advantage."], ["Lease renewal optimization is more critical than ever", "Retaining existing tenants is the highest-ROI activity in portfolio management. Every turnover event costs $2,000-$8,000 in make-ready, lost rent, and leasing fees."], ["Capital allocation decisions are increasing in complexity", "As portfolios age, capital allocation decisions have become more complex. Intelligence using maintenance data to predict capital events before they become emergency repairs saves significantly on both cost and tenant disruption."]], "data": [{"n": "Maintenance request data", "lvl": "weak", "dot": "#28c48a", "body": "Every maintenance request: unit, category, priority, time to response, time to completion, vendor, cost, and resident satisfaction rating. Yardi, AppFolio, and MRI capture this for every property. Work order volume tracked. Nobody synthesizes whether certain maintenance patterns predict equipment failure, resident dissatisfaction, or lease non-renewal.", "gap": "Units that submitted more than 3 maintenance requests in the 90 days before lease expiration renew at a 31% lower rate than units with 0-1 requests. Proactive maintenance outreach 120 days before expiration would recover an estimated 18% of that attrition."}, {"n": "Lease event & renewal data", "lvl": "weak", "dot": "#5b8ef8", "body": "Every lease: start date, end date, monthly rent, rent-to-market ratio, renewal date, renewal offer made, renewal outcome, and if not renewed, move-out reason. Nobody synthesizes which resident profiles, unit types, and maintenance histories predict renewal probability with enough lead time to intervene.", "gap": "We send renewal offers 60 days before expiration. By that point, 40% of non-renewing residents have already made the decision to leave. Synthesizing 90-day leading indicators would move the intervention window to where it can actually change the outcome."}, {"n": "Vendor performance data", "lvl": "none", "dot": "#f0a832", "body": "Every vendor invoice, every work order completion time, every callback (re-opened work order within 30 days), every vendor rating from the maintenance team. Nobody synthesizes vendor performance across these dimensions to build an evidence-based vendor scorecard.", "gap": "Vendor A completes HVAC work 40% faster than Vendor B but generates 2.8x the callbacks. After factoring in callback cost and resident satisfaction impact, Vendor A costs more per effective resolution — a fact invisible in the individual invoice data."}, {"n": "Resident satisfaction & complaint data", "lvl": "none", "dot": "#9d8ff5", "body": "Move-out surveys, maintenance satisfaction ratings, resident portal activity, and complaint logs are all captured. Resident sentiment tracked in aggregate. Nobody synthesizes satisfaction patterns by property, unit type, or management team.", "gap": "Property 12 has a resident satisfaction score of 6.8/10 vs. the portfolio average of 7.9/10. That 1.1-point gap correlates historically with a 14% higher non-renewal rate. The gap has been visible for 6 months. Nobody has diagnosed the cause."}, {"n": "Utility consumption data", "lvl": "none", "dot": "#f07060", "body": "Utility bills by unit and by property. Nobody synthesizes utility consumption anomalies indicating equipment failure, leak events, or unusual tenant behavior.", "gap": "Property 7 has had above-average water consumption for 14 consecutive months. A plumbing leak in one of the unit stacks has accumulated $28,000 in excess water cost. The anomaly is visible in the utility data but nobody is monitoring for it."}, {"n": "Financial performance by property", "lvl": "weak", "dot": "#40c070", "body": "NOI, gross potential rent, effective gross income, economic occupancy, and operating expense ratio by property — all captured in the property management accounting system. Cross-property patterns explaining why two similar properties have different NOI trajectories are almost never analyzed.", "gap": "Properties 3 and 8 have similar vintage, location quality, and rent levels. Property 3 generates $420K more in annual NOI. The difference is entirely in operating expense discipline — visible only by synthesizing 24 months of cost data across both assets."}], "synth": [["1", "Lease renewal radar", "Synthesizes maintenance request patterns, rent-to-market ratio, unit condition history, and resident satisfaction data into a 90-day renewal risk score for every lease in the portfolio."], ["2", "Vendor performance intelligence", "Synthesizes work order completion time, callback rate, resident satisfaction impact, and invoice cost for every vendor into an evidence-based vendor scorecard."], ["3", "Maintenance cost intelligence", "Identifies maintenance cost concentration by property, unit type, building system, and vendor. Surfaces which properties are trending toward elevated capital expenditure needs."], ["4", "NOI variance analysis", "Identifies which specific operating cost categories are driving NOI divergence between similar properties. Surfaces properties with above-average utility cost, turnover cost, or administrative expense."], ["5", "Utility anomaly detection", "Monitors utility consumption by property and by unit for anomalies indicating equipment failure, leak events, or unusual consumption patterns. Delivers a weekly anomaly alert for any property showing consumption 20%+ above seasonal baseline."], ["6", "Portfolio health narrative", "Monthly synthesis of the full portfolio into an ownership-ready narrative: occupancy trends, renewal performance, operating cost trajectory, and capital risk concentration."]], "model": [["Entry price", "$0.75-$1.25 per unit per month. A 3,000-unit portfolio pays $2,250-$3,750/mo. A 10,000-unit portfolio pays $7,500-$12,500/mo. Per-unit pricing maps to how property management operators already think about operating cost."], ["Scale pricing", "Rate decreases at scale. >25,000 units: $0.50-$0.75/unit/mo. Large portfolios get a lower rate because the marginal cost of synthesis scales with data volume, not linearly with unit count."], ["Delivery", "Monthly portfolio intelligence brief + weekly anomaly alerts. The weekly alert covers utility anomalies and maintenance cost spikes only — a single-page format designed for operational response."], ["Onboarding", "Yardi, AppFolio, or MRI data connection. AppFolio and MRI: 2-3 weeks. Yardi is most complex — plan 4-6 weeks. First insights at day 30."], ["Human layer", "One senior analyst per 6-8 property management clients. Property management operations background required — former asset manager, property manager, or real estate investment analyst."], ["Unit economics", "10 clients x $6,000/mo = $60K MRR / $720K ARR. Property management clients have long contract tenures. Gross margin: 65-70%."]], "risks": ["Yardi API is the most complex integration on this list. Go through their Partner Connect program and get the relationship in writing before you sell into a Yardi-based portfolio.", "Target PE-backed or institutional owners, not individual landlords. A family office or PE firm managing 5,000 units is your ideal client. An individual landlord with 500 units will not pay for this service at your price point.", "Data quality varies by property age and management tenure. Portfolios with multiple recent acquisitions often have inconsistent data histories. Your first report should include a data quality section."], "comp": [["Yardi, AppFolio, MRI", "Property management platform + reporting dashboards", "Capture every data point. Produce standard operational reports. No synthesis layer, no narrative, no anomaly detection, no forward-looking intelligence.", false], ["Asset management consultants", "Periodic asset performance reviews", "$15K-$50K per engagement. Walk in, review the data, write recommendations, walk out. No continuous synthesis.", false], ["CoStar, MSCI (market data)", "Market benchmarking and comp data", "Provide external market intelligence. Do not synthesize the portfolio own operational data into specific, actionable intelligence.", false], ["You", "Continuous portfolio data synthesis -> NOI intelligence + anomaly detection", "No dashboards. No logins. A property management veteran reads your portfolio data continuously and delivers what it means — which leases are at risk, which vendors are costing you real money, which properties have utility anomalies before the bill arrives.", true]], "gtm": [["Target portfolios immediately post-acquisition", "A PE firm that just acquired a distressed or mismanaged portfolio needs operational intelligence immediately. They have new ownership, new lenders, and new reporting obligations."], ["Free utility anomaly scan as door-opener", "Pull 12 months of utility data for a portfolio of 5-10 properties and identify any consumption anomalies. Most portfolios have at least 1-2 undetected leaks or equipment issues generating excess utility cost."], ["Real estate investment associations", "NMHC, BOMA, and IREM are your channels."], ["Real estate accounting firm partnerships", "CPA firms specializing in real estate investment (Cohen & Company, Weaver, Armanino) regularly advise property management clients on operational performance."], ["Frame pricing against turnover cost", "Every turnover in a 1,000-unit multifamily portfolio costs $3,500 on average. If we identify 30 at-risk renewals and convert 15, that is $52,500 in avoided turnover cost against a $12,000 annual service fee."]], "milestones": "<strong>Month 1-3:</strong> AppFolio and Yardi integrations. Run 2 free utility anomaly scans. Target first 2 paid clients.<br><br><strong>Month 3-6:</strong> 4-6 clients. Deliver first monthly briefs and weekly anomaly alerts. Target $25-40K MRR.<br><br><strong>Month 6-9:</strong> 8-10 clients. First PE firm referral from a real estate accounting partner. Target $50-70K MRR.<br><br><strong>Month 9-12:</strong> 12-15 clients. Second analyst hire. Target $75-100K MRR."}, {"id": "specialty_retail", "rank": 9, "tier": 3, "name": "Specialty retail (high-margin categories)", "confirmed": false, "hook": "POS, inventory, supplier, and loyalty data is extraordinarily rich. Target retailers with 40%+ gross margins — outdoor, home, beauty, auto parts, pet — where $7K/mo is a rounding error.", "scores": {"data": 91, "gap": 84, "pays": 74, "density": 82}, "stats": [["50K+", "Specialty retailers with 5+ locations"], ["40%+ GM", "Your ICP gross margin filter"], ["$30M-$200M", "Target annual revenue range"]], "sweet": "Specialty retailers with 10-50 locations doing $30M-$200M in revenue in high-margin categories: outdoor and sporting goods, pet specialty, beauty and personal care, home goods and decor, and auto parts.", "why": [["E-commerce pressure requires sharper brick-and-mortar performance", "Specialty retailers facing e-commerce competition from Amazon and DTC brands need every location to perform at its full potential. Intelligence identifying underperforming locations and product categories before the problem compounds is directly defensive."], ["Supplier cost inflation is compressing gross margins", "COGS inflation has compressed specialty retail gross margins across most categories. Retailers identifying which supplier relationships contribute to margin compression have a significant advantage."], ["Customer behavior has shifted post-COVID", "Specialty retail customer visit frequency, basket size, and category penetration have all shifted since 2020. Retailers identifying which customer cohorts have grown, which have diminished, and which are at risk of conversion to online alternatives can direct loyalty investment accordingly."]], "data": [{"n": "POS transaction data", "lvl": "weak", "dot": "#28c48a", "body": "Every transaction, every item, every basket, every promotion, every return. Retailers see location-level daily sales totals. Cross-location basket analysis and SKU profitability by store is almost never done.", "gap": "Our top-selling item by unit volume has a 38% gross margin. Our 12th-ranked item by unit volume has a 67% gross margin. Optimizing shelf allocation by margin per square foot across locations would recover $280K in annual margin."}, {"n": "Inventory management data", "lvl": "weak", "dot": "#5b8ef8", "body": "Every purchase order, receiving event, inventory count, shrink record, transfer between locations, and return to vendor. Cross-location inventory optimization — which items are overstocked in one location while out-of-stock in another — almost never analyzed in real time.", "gap": "We have $340K in slow-moving inventory across the network sitting more than 90 days. 60% of that inventory exists in locations where sell-through velocity is low — and is simultaneously out of stock in locations where velocity is high."}, {"n": "Supplier performance & pricing", "lvl": "none", "dot": "#f0a832", "body": "Every purchase order, invoice, price change, delivery performance record, vendor credit, and return. Cumulative price change analysis by vendor and category over 18-24 months is almost never synthesized.", "gap": "We have 14 vendors who have raised prices more than 8% in 18 months. 6 of those vendors have a lower-margin-impact alternative available. We have been renewing relationships based on existing agreements rather than synthesizing what the pricing history tells us."}, {"n": "Customer loyalty & purchase history", "lvl": "weak", "dot": "#9d8ff5", "body": "For retailers with loyalty programs: every customer full purchase history, visit frequency, average basket, category penetration, and RFM profile. Customer cohort analysis almost never done.", "gap": "Our loyalty program members who purchase across 3+ categories have a 4.8x higher LTV than single-category purchasers. We have no insight into which single-category members are candidates for cross-category development."}, {"n": "Marketing promotion data", "lvl": "none", "dot": "#f07060", "body": "Every promotional campaign: items featured, discount depth, communication channel, promotion period, and resulting transaction data. Marketing attribution — which promotions drove trial vs. repeat purchase — rarely synthesized against margin impact.", "gap": "Our last 4 clearance events drove above-average foot traffic but below-average gross margin per visit. We are training our customers to wait for sales. The margin-adjusted promotion ROI has never been calculated."}, {"n": "Location performance comparison", "lvl": "weak", "dot": "#40c070", "body": "Revenue per square foot, gross margin per square foot, conversion rate, average transaction value, and customer visit frequency by location. Multi-dimensional performance comparison identifying which locations underperform their trade area potential almost never done.", "gap": "Location 8 produces $420/sq ft vs. portfolio average of $580/sq ft. Revenue per customer visit is the same. The gap is in visits per customer per year — 2.1 vs. 3.4 portfolio average. It is a loyalty and repeat visit problem, not a conversion or basket problem."}], "synth": [["1", "SKU profitability intelligence", "Calculates true margin contribution by SKU after factoring in carrying cost, shrink rate, return rate, and shelf space allocation cost. Identifies which items are destroying margin per square foot despite strong unit volume."], ["2", "Customer cohort analysis", "Segments loyalty program members by RFM profile, category penetration, and cohort vintage. Identifies which customer segments are growing, which are churning, and which have the highest conversion potential for cross-category development."], ["3", "Inventory optimization intelligence", "Identifies slow-moving inventory concentration, cross-location stock imbalances, and seasonal demand patterns that predict future stockout risk. Delivers weekly rebalancing recommendations that improve inventory turns without additional purchasing."], ["4", "Supplier margin intelligence", "Tracks cumulative price changes by vendor and category. Identifies which supplier relationships are contributing to gross margin compression. Surfaces where alternative sourcing exists."], ["5", "Promotion ROI synthesis", "Calculates the full margin impact of each promotional event — including the forward-period effect on normal-price purchases. Identifies which promotions drive trial and loyalty vs. which train customers to wait for discounts."], ["6", "Location performance narrative", "Multi-dimensional comparison of each location against its trade area potential. Identifies the specific performance gap — visit frequency, conversion rate, basket size, or category penetration — and surfaces the factors most likely to close it."]], "model": [["Entry price", "$4,500/mo for 10-20 locations. At a retailer doing $40M with 42% gross margins, this protects $16.8M in gross margin for $54K/year — 0.32% of gross margin."], ["Scale pricing", "$200-$350 per additional location above 20. A 35-location retailer pays $7,500-$10,000/mo."], ["Delivery", "Monthly intelligence brief + seasonal planning sessions. Monthly covers SKU profitability, inventory flags, and customer cohort trends. Seasonal planning sessions before Q4 and summer provide forward-looking inventory and promotion strategy input."], ["Onboarding", "POS + inventory + loyalty system connections. Lightspeed, Shopify POS, and Square have excellent API documentation. 2-3 week setup."], ["Human layer", "One senior analyst per 8-10 retail clients. Specialty retail operations or buying background required — former retail buyer, category manager, or director of operations."], ["Unit economics", "12 clients x $6,500/mo = $78K MRR / $936K ARR. Retail clients have seasonal budget sensitivity — pitch between January-March or September-October. Gross margin: 65-68%."]], "risks": ["The ICP filter is the narrowest on this list. The 40%+ gross margin filter is critical. Outdoor, pet, beauty, home goods, and auto parts are your targets. Commodity retail is not.", "Commodity retail is not specialty retail. Grocery, discount, and convenience retail have margins that make $7K/mo feel painful rather than invisible. Never let the category filter slip.", "Seasonality affects both the business and your sales cycle. Specialty retailers are heads-down during peak selling seasons (Q4, summer for outdoor). Sales cycles initiated in September close by November — or they close in January."], "comp": [["POS vendors (Lightspeed, Square)", "Point-of-sale platform + basic reporting", "Capture transaction data. Produce standard sales reports. No inventory-POS-loyalty correlation. No cross-location synthesis.", false], ["Retail analytics platforms (Glew, Daasity)", "E-commerce and retail analytics dashboards", "Primarily designed for e-commerce. Provide dashboards requiring a trained user. No human narrative layer.", false], ["Retail consultants", "Periodic merchandising and operations consulting", "$20K-$60K per engagement. Observation-based. No continuous data synthesis.", false], ["You", "Continuous POS + inventory + loyalty synthesis", "No dashboards. No logins. A retail-experienced analyst reads your POS, inventory, and loyalty data simultaneously and delivers what it means — SKU by SKU, location by location, customer cohort by customer cohort. Monthly.", true]], "gtm": [["Target retailers preparing for PE exit or new equity investment", "A specialty retailer preparing for a sale or PE investment needs to demonstrate operational intelligence. An intelligence service that produces a credible board-level performance narrative adds directly to enterprise value."], ["Free inventory optimization scan as door-opener", "Pull 90 days of inventory data and identify slow-moving stock concentration and cross-location imbalances. Most specialty retailers have $150K-$500K in recoverable inventory value in the wrong locations."], ["Specialty retail industry associations", "NRF and category-specific associations (PBSA for pet, OIA for outdoor, HFPA for home furnishings) are your channels."], ["Retail technology partner relationships", "Lightspeed, Shopify, and Square all have agency/partner programs. A listing as an intelligence partner generates inbound from retailers already investing in their technology stack."], ["Anchor to gross margin protection", "Your gross margin is $16M on $40M in revenue. We protect that margin by identifying $300K-$500K in annual margin leakage through SKU optimization, inventory management, and supplier intelligence. At $54K/year, that is a 6-9x ROI."]], "milestones": "<strong>Month 1-3:</strong> Lightspeed and Shopify POS integrations. Run 2 free inventory audits in one category (outdoor or pet). Target first 2 paid clients.<br><br><strong>Month 3-6:</strong> 5 clients in one category vertical. Build category association presence. Target $25-35K MRR.<br><br><strong>Month 6-9:</strong> 8-10 clients. Publish category-specific benchmark report. Target $50-70K MRR.<br><br><strong>Month 9-12:</strong> 12-15 clients across 2 categories. Second analyst hire. Target $80-100K MRR."}, {"id": "professional_services", "rank": 10, "tier": 3, "name": "Professional services — accounting & engineering firms", "confirmed": false, "hook": "Project profitability, utilization rates, client health signals, and billing realization sit completely unread in practice management systems. High margins. Analytically sophisticated buyers.", "scores": {"data": 80, "gap": 85, "pays": 88, "density": 76}, "stats": [["~45K", "Mid-market US professional services firms"], ["25-250 staff", "Your ICP firm size"], ["$8M-$80M", "Revenue sweet spot"]], "sweet": "Accounting firms and engineering/architecture firms with 25-250 professional staff doing $8M-$80M in revenue. Large enough to have meaningful practice management data, multiple clients, and multiple partners. Small enough to lack internal analytics capability.", "why": [["Professional services M&A is at record levels", "Accounting and engineering firm M&A has been at historic highs since 2020. PE-backed platforms are acquiring mid-market firms at aggressive multiples. Every firm preparing for a transaction needs operational intelligence to demonstrate performance."], ["Client retention has become more fragile", "Economic uncertainty has made professional services clients more willing to issue RFPs and evaluate alternatives. Firms that identify client drift 90 days before a relationship formally ends have time to intervene."], ["Utilization and realization pressure is intensifying", "Remote work has complicated utilization management. Rate increases have put pressure on realization percentages. Firms identifying which engagement types produce the highest realization have a significant profit recovery opportunity."]], "data": [{"n": "Time & billing data", "lvl": "weak", "dot": "#28c48a", "body": "Every time entry: date, professional, client, matter, activity code, hours recorded, hours billed, billing rate, write-up/write-down. CCH, Thomson Reuters Practice CS, Deltek Vision, and BST Global capture this exhaustively. Realization rates reported monthly by partner. Cross-portfolio pattern analysis almost never done.", "gap": "Our average billing realization across the firm is 84%. Our top-performing 20% of engagements realize at 96%. Our bottom 20% realize at 68%. The difference is entirely predictable from the engagement type, client industry, and managing partner assignment."}, {"n": "Project profitability data", "lvl": "weak", "dot": "#5b8ef8", "body": "Budgeted vs. actual hours by phase and task, staff assignment vs. budget plan, milestone achievement dates, and client change order frequency. Nobody synthesizes which engagement types are systematically over-budget and which client types generate the most destructive scope creep.", "gap": "Fixed-fee engagements for clients in the manufacturing sector consistently overrun budgeted hours by 22% in our firm. That pattern has been true for 3 years. Every new fixed-fee manufacturing engagement is priced at a loss before it starts."}, {"n": "Client relationship data", "lvl": "none", "dot": "#f0a832", "body": "Matter open dates, matter close dates, client revenue over time, referral source, cross-service utilization, contact frequency, and payment history. Client health assessed based on current-year revenue. Nobody synthesizes leading indicators of client relationship decline.", "gap": "A client whose annual fee revenue has been flat for 3 years while billing complexity has increased is effectively a declining relationship in terms of margin. We have 14 such clients. Nobody has identified them as an at-risk segment."}, {"n": "Utilization data", "lvl": "weak", "dot": "#9d8ff5", "body": "Billable hours per week, billable percentage by professional, utilization by department and level, and bench time by specialty are all tracked. Nobody synthesizes whether utilization patterns predict staff retention risk.", "gap": "Professionals assigned to 3+ simultaneous engagements for 12+ consecutive weeks have a 3.1x higher voluntary departure rate in our firm. That pattern is visible in the time tracking system. Nobody has ever analyzed it."}, {"n": "Proposal & pipeline data", "lvl": "none", "dot": "#f07060", "body": "Every proposal submitted: service type, client industry, fee amount, whether won or lost, competitive situation, and if lost, stated reason. Win/loss data exists in CRM. Nobody synthesizes which proposal types produce the highest win rates.", "gap": "Our win rate on competitive proposals for new clients in the healthcare sector is 41%. Our win rate on referral-based introductions in the same sector is 78%. We allocate 60% of our business development budget to cold competitive situations."}, {"n": "Staff performance & development data", "lvl": "none", "dot": "#40c070", "body": "Performance review data, training completion, mentorship assignment, promotion timing, and realization rate by professional over time are all captured. Staff development decisions made on qualitative assessment.", "gap": "Associates who work on 3+ different service lines in their first 2 years develop 18% higher realization rates by year 4 than those who specialize immediately. That finding would reshape our staffing model — but it is only visible in retrospective data analysis."}], "synth": [["1", "Engagement profitability intelligence", "Full profitability analysis by engagement type, client industry, managing partner, and fee structure. Identifies which engagement categories are systematically profitable vs. which are margin destroyers in practice despite appearing profitable in fee discussions."], ["2", "Client health radar", "Synthesizes billing volume trends, matter complexity growth, payment timing, referral activity, and contact frequency into a monthly client health score. Identifies which client relationships are deepening vs. drifting 90 days before the drift becomes a lost relationship."], ["3", "Realization pattern analysis", "Identifies the specific factors that predict high realization rates — engagement type, partner assignment, client industry, staffing model, billing frequency — and which combinations consistently produce write-downs."], ["4", "Utilization & retention intelligence", "Identifies assignment and utilization patterns that correlate with professional staff retention vs. departure. Surfaces which team members are at statistically elevated departure risk based on workload, assignment variety, and mentorship patterns."], ["5", "Pipeline quality analysis", "Synthesizes win/loss data against proposal characteristics to identify which types of opportunities produce the highest win rates and the most profitable engagements post-win."], ["6", "Firm performance narrative", "Monthly synthesis of firm-level performance into a managing partner and partner group narrative: realization trends, client health distribution, utilization patterns, and pipeline quality."]], "model": [["Entry price", "$4,500/mo for firms with 25-75 professionals. At a $12M accounting firm with 65% net margins, this protects $7.8M in net revenue for $54K/year — 0.7% of net revenue."], ["Scale pricing", "$6,000-$10,000/mo for firms with 75-250 professionals. At this size, data complexity and ROI both scale significantly."], ["Delivery", "Monthly partner report + bi-monthly managing partner briefing. The partner report covers client health, realization trends, and utilization patterns. The managing partner briefing is a 30-minute discussion of the 3 most significant findings."], ["Onboarding", "Practice management system data connection. CCH, Thomson Reuters, Deltek, and BST all have API or data export capabilities. 2-4 week setup. First insights at day 21."], ["Human layer", "One senior analyst per 7-9 professional services firm clients. Public accounting, management consulting, or professional services operations background required."], ["Unit economics", "12 clients x $6,000/mo = $72K MRR / $864K ARR. Professional services firms are highly sticky clients — once integrated into partner reporting cadence, leaving creates significant operational disruption. Gross margin: 68-72%."]], "risks": ["Start with accounting firms, not professional services broadly. Accounting firms have the cleanest time and billing data, the most analytical culture, and the most active M&A market creating urgency.", "Partner culture can slow the sale. Professional services partnerships are consensus-oriented. Expect the managing partner to need to bring 2-3 other partners into the evaluation before signing.", "Data sensitivity is high. Client matter data is sensitive. Your data use agreement needs to be explicit about confidentiality and anonymization in benchmark reports. Have legal documentation tight before your first accounting firm conversation."], "comp": [["Practice management vendors (CCH, Deltek)", "Time tracking + billing + reporting", "Produce standard billing and utilization reports. No synthesis. No narrative. No forward-looking intelligence.", false], ["Fathom, Spotlight Reporting", "Financial reporting and dashboard tools", "Produce formatted financial reports from accounting data. Do not synthesize time and billing, project profitability, client health, and staff retention data simultaneously.", false], ["Professional services consultants", "Strategic and operational consulting", "$30K-$100K per engagement. Observation-based. No continuous synthesis.", false], ["You", "Continuous practice management synthesis", "No dashboards. No logins. A professional services veteran reads your time and billing, project, and client data continuously and delivers what it means — which clients are drifting, which engagements are margin-negative, which staff are at departure risk. Monthly.", true]], "gtm": [["Target firms that are 12-24 months from a transaction", "An accounting or engineering firm preparing for a PE-backed platform acquisition needs to demonstrate operational intelligence. You arrive at the moment of maximum receptivity."], ["Free realization analysis as door-opener", "Pull 12 months of time and billing data and identify the top 3 realization gap drivers. Most firms find $150K-$500K in annual recoverable revenue."], ["Professional association channels", "AICPA (accounting), ACEC (engineering), SMPS (architecture and engineering marketing), and state-level CPA societies are your channels."], ["PE-backed professional services platforms as enterprise clients", "PE firms that have assembled multi-firm accounting or engineering platforms need portfolio intelligence across all their acquisitions — a single enterprise relationship covering 5-15 firms might be worth $15K-$30K/mo."], ["Frame ROI around recoverable net income", "Your net margin is 38% on $12M in revenue. We protect and recover net income by identifying realization gaps and client drift. Our first-year clients typically identify $150K-$400K in recoverable net income — against a $54K annual service fee."]], "milestones": "<strong>Month 1-3:</strong> CCH and Deltek integrations. Run 2 free realization analyses for accounting firms. Target first 2 paid clients.<br><br><strong>Month 3-6:</strong> 5 clients. Deliver first monthly partner reports. Build AICPA or state CPA society presence. Target $24-35K MRR.<br><br><strong>Month 6-9:</strong> 8-10 clients. First PE-platform inquiry. Publish benchmark data on accounting firm realization rates. Target $52-72K MRR.<br><br><strong>Month 9-12:</strong> 12-15 clients. Second analyst hire. Begin engineering/architecture expansion. Target $75-100K MRR."}];
const PLAT = [{"id": "applied_epic", "rank": 1, "tier": 1, "name": "Applied Epic", "industryTag": "Insurance agencies", "encroach": "low", "hook": "The single biggest data-to-synthesis gap in any vertical software. Applied Epic captures everything about an agency's book of business — and its native reporting is notoriously, legendarily inadequate.", "scores": {"data": 95, "gap": 98, "pays": 91, "community": 88, "api": 72}, "stats": [["20K+", "Agencies on Applied Epic globally"], ["200-2,000", "Employees at your ICP agencies"], ["$8M-$40M", "Commission revenue ICP"]], "sweet": "Independent and regional insurance agencies with 50-300 employees doing $5M-$40M in commission revenue. Large enough to have a meaningful book of business across multiple lines, producers, and carrier relationships — but small enough to have no internal analytics capability.", "why": [["Hard market is exposing carrier relationship intelligence gaps", "Carriers have been tightening underwriting appetites, withdrawing from markets, and raising rates at historic pace. Agencies that identify which carrier relationships are degrading before clients feel the impact have a critical advantage."], ["Producer performance accountability is increasing", "Agency principals are under pressure from ownership groups and PE buyers to demonstrate producer performance rigor. Intelligence that surfaces which producers are building durable client relationships vs. churning accounts is directly responsive to that pressure."], ["E&O risk management requires proactive pattern analysis", "Errors and omissions claims are increasingly driven by coverage gaps, missed renewals, and communication failures — all patterns visible in Epic data that are almost never synthesized into risk intelligence."]], "captures": [{"n": "Book of business & policy data", "body": "Every policy: carrier, line of business, premium, effective date, expiration date, producer, CSR, coverage detail, endorsements, and commission rate. An agency with $20M in premium volume has tens of thousands of policy records across hundreds of carriers and dozens of producers.", "chips": ["All policies & endorsements", "Premium by line & carrier", "Commission ledgers", "Coverage detail", "Expiration pipeline"]}, {"n": "Producer performance records", "body": "Every producer's book, new business production, renewal retention, lost business, and activity log. Producer performance reports exist in Epic but are limited to simple production summaries. Cross-producer pattern analysis — which producers have the most durable client relationships — is never done.", "chips": ["New business production", "Renewal retention rates", "Lost business reasons", "Activity & pipeline logs", "Commission by producer"]}, {"n": "Carrier relationship data", "body": "Submission history by carrier, acceptance rates, declination reasons, turnaround times, renewal behavior, and loss ratio by carrier across the agency's book. This data exists entirely in Epic. No agency synthesizes it into a carrier relationship scorecard.", "chips": ["Submission & bind rates", "Carrier turnaround times", "Renewal behavior patterns", "Loss ratio by carrier", "Market access trends"]}, {"n": "Client interaction & service history", "body": "Every client contact, every certificate issued, every claim reported, every coverage review completed, and every policy change. Service activity by client and by CSR is captured but never synthesized into client satisfaction or at-risk indicators.", "chips": ["Client contact history", "Certificate volumes", "Claims activity", "Coverage review completion", "CSR service activity"]}], "synth": [["1", "Book of business health analysis", "Synthesizes renewal pipeline, producer retention rates, and carrier availability trends to identify which segments of the book are at elevated non-renewal risk. Identifies concentration risk before it creates client servicing crises."], ["2", "Carrier relationship scorecard", "Synthesizes submission acceptance rates, turnaround time trends, declination reasons, and renewal behavior by carrier into a monthly scorecard. Identifies which carrier relationships are degrading before it affects client service."], ["3", "Producer performance intelligence", "Correlates producer production activity, retention rates, client growth, and book quality into a multi-dimensional performance view. Identifies which producers are building durable client relationships and which are churning accounts."], ["4", "Renewal pipeline intelligence", "Synthesizes the 90-day and 180-day renewal pipeline by line, by carrier, and by producer. Identifies which renewals are at risk based on carrier appetite changes, prior year loss activity, and producer relationship signals."], ["5", "E&O risk pattern analysis", "Synthesizes coverage gap indicators, missed communication patterns, and client complaint history to identify which clients and account types have elevated E&O risk exposure. Enables proactive coverage review before an E&O claim materializes."], ["6", "Agency performance narrative", "Monthly synthesis of the agency's book performance — premium growth, retention rate, producer activity, and carrier relationship health — into an agency principal and ownership-ready narrative."]], "model": [["Entry price", "$4,000/mo for agencies with $5M-$15M in commission revenue. At a $10M commission agency, this is 0.4% of revenue."], ["Scale pricing", "$6,000-$10,000/mo for agencies with $15M-$40M in commission revenue. Scales with book complexity."], ["Delivery", "Monthly intelligence brief + quarterly renewal pipeline review. The quarterly review is a forward-looking session covering the 6-month renewal pipeline, carrier relationship alerts, and producer performance trends."], ["Onboarding", "Applied Systems partner/integration program. Plan 6-10 weeks for first integration. The friction is real — and it is a competitive moat. Once you have done it, competitors face the same barrier."], ["Human layer", "One senior analyst per 6-8 agency clients. Insurance agency operations background required — former agency principal, VP of operations, or agency management consultant."], ["Unit economics", "10 clients x $6,000/mo = $60K MRR / $720K ARR. Insurance agency clients are highly sticky — switching requires re-establishing Epic integration and rebuilding 12 months of context. Gross margin: 68-72%."]], "risks": ["Applied Systems API access requires formal partnership. Go through the Applied Client Network (ACN) partner program. The process takes time but gives you certified access and marketing visibility in the ACN community.", "Agency size matters more than almost any other variable. An agency with $2M in commission revenue cannot afford $4K/mo. An agency with $50M+ probably has an internal operations team. The $8M-$30M commission range is your sweet spot.", "Carrier relationship intelligence is your strongest differentiator. No other vendor synthesizes carrier performance data from Epic in a way that gives agencies advance warning of market access degradation. Lead with this in your pitch."], "ecosystem": [["Applied Analytics (native)", "Built-in Epic reporting module", "Produces standard book reports. Requires significant manual configuration. No forward-looking synthesis. No carrier scorecard. Most agencies use it for basic production reports and nothing else."], ["Agency management consultants", "Periodic strategic and operational consulting", "$15K-$40K per engagement. Observation-based. No Epic data access in most cases."], ["Insurance benchmarking services", "Industry-level peer comparison data", "Provide external benchmarks against peer agencies. Do not synthesize the agency own Epic data into specific intelligence about their own book, producers, and carrier relationships."]], "gtm": [["Join the Applied Client Network (ACN) as a partner", "The ACN is your single most important GTM asset for this platform. ACN membership gives you access to the annual conference (2,000+ attendees), regional user group events, the ACN marketplace listing, and credibility signals that matter to agency buyers."], ["Free carrier relationship audit as door-opener", "Pull 12 months of submission and renewal data from an agency's Epic and produce a 5-page carrier relationship scorecard. Identify the top 3 carrier relationships showing degradation signals. Close rate from audit: 65-75%."], ["Regional insurance association channels", "IIABA/Big I, state-level independent agent associations, and the Council of Insurance Agents & Brokers (CIAB) are your channels. These communities are close-knit and trust peer recommendations above all else."], ["Applied partner marketplace listing", "The ACN partner marketplace lists certified integration and service partners directly in the Applied Systems ecosystem. A partner listing generates inbound from agencies actively looking for intelligence capabilities."], ["Frame ROI around retention and producer development", "A 1% improvement in book retention at a $20M premium agency recovers $200K in annual commission. Our average client improves retention by 2.5% in the first year. At $48K/year, that is a 10x ROI before we count carrier relationship improvements or E&O risk reduction."]], "milestones": "<strong>Month 1-3:</strong> Complete Applied Systems integration partner program. Run 3 free carrier relationship audits. Target first 2 paid clients. Join ACN.<br><br><strong>Month 3-6:</strong> 5 clients. Deliver first monthly intelligence briefs. Attend ACN regional event. Target $25-35K MRR.<br><br><strong>Month 6-9:</strong> 8-10 clients. Speak at ACN regional event. Publish State of Independent Agency Book Performance benchmark report. Target $50-70K MRR.<br><br><strong>Month 9-12:</strong> 12-15 clients. Second analyst hire. Apply for ACN Annual Conference speaking slot. Target $75-100K MRR."}, {"id": "servicetitan", "rank": 2, "tier": 1, "name": "ServiceTitan", "industryTag": "Home services — HVAC, plumbing, electrical, roofing", "encroach": "med", "hook": "The operating system for $3M-$30M home services companies. Captures job data, technician performance, membership programs, and marketing attribution — none of it synthesized at the business level.", "scores": {"data": 93, "gap": 88, "pays": 90, "community": 94, "api": 85}, "stats": [["8,000+", "ServiceTitan customers"], ["$3M-$30M", "Typical customer revenue"], ["$6.3B", "ServiceTitan valuation (2022 round)"]], "sweet": "Home services companies doing $3M-$30M in revenue across HVAC, plumbing, electrical, and roofing. These operators adopted ServiceTitan because they believe in data-driven operations — but the synthesis layer between the data and the business decision is almost entirely absent.", "why": [["Home services consolidation creating multi-brand operators who need portfolio intelligence", "PE-backed home services platforms are acquiring multiple brands and geographies under one holding company. Each brand runs ServiceTitan. Nobody synthesizes performance across brands. The intelligence gap at the portfolio level is enormous."], ["ServiceTitan is raising its own analytics game — forcing differentiation", "ServiceTitan is actively building Titan Intelligence and analytics features. They are building dashboards, not narrative synthesis. Your moat is the human analyst who interprets what the data means for THIS company, not just what the number is."], ["Membership program management has become complex and under-analyzed", "ServiceTitan's membership module is widely adopted but deeply under-analyzed. Operators know membership counts and renewal rates at a summary level. Nobody synthesizes which membership types produce the highest LTV customers."]], "captures": [{"n": "Job & dispatch data", "body": "Every dispatched job: type, priority, assigned technician, scheduled time, arrival time, time on site, revenue generated, parts used, and close disposition. ServiceTitan captures the full service workflow from dispatch to invoice for every call.", "chips": ["Job type & priority", "Technician assignment", "Revenue per job", "Parts & materials", "Job close disposition", "Time metrics"]}, {"n": "Technician performance data", "body": "Every technician's job count, revenue generated, average ticket, membership conversion rate, callback rate, and CSI scores. Technician performance is reported individually. Cross-technician pattern analysis — which behaviors predict the highest average ticket AND the lowest callback rate simultaneously — is never done.", "chips": ["Revenue per technician", "Average ticket by type", "Membership conversion", "Callback frequency", "CSI scores", "Utilization rates"]}, {"n": "Membership program data", "body": "Every membership: type, customer, enrollment date, renewal date, renewal outcome, services used under membership, and LTV. Membership counts and renewal rates are tracked. Member behavior analysis — which members use the membership heavily vs. which renew annually without using it — is almost never synthesized.", "chips": ["Member enrollment & renewal", "Service utilization per member", "Member LTV calculation", "Renewal rate by type", "Membership conversion rate", "Geographic penetration"]}, {"n": "Marketing attribution data", "body": "Every booked call's marketing source: Google PPC, LSA, direct mail, Yelp, Angi, organic SEO, referral, or repeat customer. Revenue generated per booking by source. Cost-per-lead is tracked. Cost-per-profitable-job by source — after adjusting for job type mix, average ticket, and cancellation rate — is almost never calculated.", "chips": ["Call source attribution", "Cost per booked call", "Revenue by source", "Cancellation rate by source", "Lead quality by channel", "Repeat vs new customer"]}], "synth": [["1", "Technician performance intelligence", "Identifies which technicians produce the highest average ticket, the highest membership conversion rate, and the lowest callback rate simultaneously — and correlates those outcomes with their specific call behaviors, part ordering patterns, and time management."], ["2", "Membership program optimization", "Synthesizes membership utilization patterns, renewal rates, and customer LTV by membership type, geographic segment, and customer profile. Identifies which membership design produces the highest margin per member."], ["3", "Marketing ROI by deal quality", "Calculates cost-per-profitable-job by marketing source — not just cost-per-lead. Identifies which channels produce high-ticket, high-membership-conversion, low-cancellation customers vs. which produce low-ticket, no-membership, high-cancellation traffic."], ["4", "Job profitability patterns", "Identifies which job types, geographic areas, and customer segments produce the highest gross margin after parts, labor, and overhead allocation. Surfaces which job types are being underpriced relative to their market."], ["5", "Customer retention intelligence", "Synthesizes call frequency, service history, membership status, and geographic patterns to identify customers at elevated churn risk. Delivers a monthly outreach list of customers who have not booked in 12+ months."], ["6", "Operations performance narrative", "Monthly synthesis of business performance into an owner and management report: revenue trends, technician performance distribution, membership program health, and marketing efficiency."]], "model": [["Entry price", "$3,500/mo for companies doing $3M-$8M in revenue. At a $5M HVAC company with 35% gross margins, this is 0.7% of gross profit — less than the monthly cost of one callbacks-related truck roll."], ["Scale pricing", "$5,000-$8,000/mo for companies doing $8M-$30M. Multi-trade or multi-location operators pay more because their data complexity and ROI both scale significantly."], ["Delivery", "Monthly intelligence brief + monthly 30-minute owner call. The owner call is the most important element — home services operators respond to conversational intelligence delivery, not written reports. Your analyst calls the owner every month to walk through the 3 most important findings."], ["Onboarding", "ServiceTitan API connection. ServiceTitan has a documented, accessible API with a formal integration program. Setup: 1-2 weeks. First insights at day 21. One of the smoothest integrations on this list."], ["Human layer", "One senior analyst per 10-12 clients. Home services business operations background helpful — former service manager, GM, or home services consultant. Understanding what a callback rate means in context of technician experience is essential."], ["Unit economics", "15 clients x $5,000/mo = $75K MRR / $900K ARR. Shorter sales cycles than most verticals — home services owners make decisions quickly. Gross margin: 67-71%."]], "risks": ["ServiceTitan's Titan Intelligence is your biggest competitive threat. Watch what they build. Your positioning must continuously evolve to emphasize the human analyst interpretation layer — the thing they cannot replicate as a software product.", "Home services owners are time-poor and skeptical of anything that feels like overhead. Your delivery format must be immediately actionable — not comprehensive. Three specific things to do this week, not 20 pages of analysis.", "PE-backed multi-brand operators require a different engagement model. A holding company with 5 ServiceTitan brands needs portfolio-level synthesis across all 5 brands. Price this as an enterprise engagement ($15K-$25K/mo) and treat it separately from your single-brand go-to-market."], "ecosystem": [["Titan Intelligence (ServiceTitan native)", "Built-in analytics and AI features", "Building dashboards and AI-assisted scheduling recommendations. Not building human analyst narrative. Not synthesizing marketing ROI by deal quality or membership LTV by customer segment. Your moat is the analyst."], ["Scoreboard (ServiceTitan ISV)", "KPI tracking and technician scoreboards", "Produces technician performance scorecards. One-dimensional view. No cross-function synthesis. No narrative intelligence. No owner-facing monthly briefing."], ["Home services consultants", "Business coaching and operational improvement", "Periodic coaching engagements. Observation-based. No continuous data synthesis from ServiceTitan. High cost, episodic value."]], "gtm": [["ServiceTitan Pantheon conference is your annual anchor event", "Pantheon is ServiceTitan's annual user conference — the single most concentrated gathering of ServiceTitan operators in the world. A sponsored session, booth, or speaking slot at Pantheon puts you in front of 2,000+ of your exact prospect profile in 3 days."], ["ServiceTitan partner marketplace listing", "ServiceTitan's Pro Marketplace lists certified integration partners directly in the platform. Operators browsing for analytics and intelligence tools find you inside the tool they already use daily."], ["Home services owner Facebook groups and communities", "Home Services Nation, the HVAC Business Builders group, and similar Facebook communities have 10K-50K members who are exactly your prospect profile. Providing genuine value in these communities builds trust and generates inbound at low cost."], ["Free membership program audit as door-opener", "Pull 12 months of ServiceTitan membership data and deliver a 5-page membership program analysis: member LTV by tier, renewal rate by segment, and the estimated revenue opportunity from improving renewal rates by 10%. Most operators find $50K-$150K in recoverable membership revenue."], ["PE-backed home services platforms as enterprise channel", "Companies like Wrench Group, Neighborly, Authority Brands have assembled multi-brand platforms all running ServiceTitan. A single enterprise relationship covering 10-20 brands is worth $150K-$300K in ARR."]], "milestones": "<strong>Month 1-3:</strong> ServiceTitan API integration. Run 3 free membership audits. Register for Pantheon. Target first 3 paid clients.<br><br><strong>Month 3-6:</strong> 8 clients. Apply for ServiceTitan Pro Marketplace listing. Deliver first monthly briefs and owner calls. Target $35-50K MRR.<br><br><strong>Month 6-9:</strong> 12-15 clients. Attend Pantheon. Publish State of Home Services Performance benchmark report. Target $65-85K MRR.<br><br><strong>Month 9-12:</strong> 18-22 clients. Second analyst hire. Begin pursuing first PE platform enterprise relationship. Target $95-120K MRR."}, {"id": "netsuite", "rank": 3, "tier": 1, "name": "NetSuite", "industryTag": "Mid-market ERP — cross-industry", "encroach": "low", "hook": "The dominant ERP for $10M-$200M companies. Captures financial, operational, CRM, inventory, and project data in one system. Most companies have no one synthesizing across modules.", "scores": {"data": 97, "gap": 85, "pays": 93, "community": 86, "api": 80}, "stats": [["40,000+", "NetSuite customers globally"], ["$10M-$200M", "Target customer revenue range"], ["6.5%", "DMS market CAGR through 2032"]], "sweet": "Mid-market companies across industries doing $10M-$200M in revenue that have been running NetSuite for at least 18 months. They have years of integrated financial, operational, and CRM data in one system — and almost never synthesize across modules.", "why": [["NetSuite implementations are reaching data maturity", "Companies that implemented NetSuite 2-4 years ago have reached the data maturity threshold where meaningful pattern analysis becomes possible. The first 18 months of NetSuite data is often messy. By year 3, the data quality and depth supports serious synthesis."], ["SuiteAnalytics Workbook is underused and underdelivering", "NetSuite's own analytics module (SuiteAnalytics Workbook) is powerful in theory and deeply underused in practice. Most companies use it for basic financial reports. The cross-module synthesis capability exists but requires a skilled analyst to configure."], ["Oracle acquisition has made enterprise intelligence features inaccessible to mid-market", "Oracle's ownership of NetSuite has increasingly pushed enterprise analytics features toward larger organizations. Mid-market companies are left with SuiteAnalytics Workbook — which requires analytical expertise — and nothing in between."]], "captures": [{"n": "Full financial data", "body": "Every journal entry, every AR/AP transaction, every bank reconciliation, every budget vs. actual variance. The complete general ledger across all subsidiaries and entities in one system.", "chips": ["Full general ledger", "AR/AP transactions", "Budget vs. actual", "Cash flow data", "Multi-entity consolidation", "Period-close data"]}, {"n": "Operational & inventory data", "body": "Every purchase order, every goods receipt, every inventory count, every transfer order, every warehouse movement. For manufacturers and distributors, this is complete supply chain data in the same system as the financials — a combination that almost never gets synthesized.", "chips": ["Inventory movements", "Purchase orders", "Goods receipts", "Fulfillment data", "Vendor performance", "Return & credit data"]}, {"n": "CRM & sales pipeline data", "body": "Every opportunity, every customer interaction, every quote, every sales order, every customer record. NetSuite CRM captures the core relationship and transaction history that, when correlated with financial data, reveals true customer profitability.", "chips": ["Opportunity pipeline", "Customer history", "Quote & order data", "Sales activity", "Win/loss records", "Customer segments"]}, {"n": "Project & resource data", "body": "For professional services and project-based companies: every project, every resource assignment, every time entry, every project budget vs. actual. NetSuite's project module connects project performance directly to financials — a connection almost never exploited for intelligence.", "chips": ["Project budgets vs. actual", "Resource utilization", "Time entries", "Project profitability", "Milestone tracking", "Client billing by project"]}], "synth": [["1", "Customer profitability intelligence", "Combines CRM transaction history, order data, return frequency, payment behavior, and allocated overhead to calculate true customer profitability after full cost allocation."], ["2", "Working capital optimization", "Synthesizes AR aging, AP payment timing, inventory turnover, and cash conversion cycle data into a working capital intelligence brief. Identifies where cash is trapped unnecessarily."], ["3", "Inventory & supply chain intelligence", "Correlates inventory movement data with financial data to identify slow-moving inventory carrying cost, supplier reliability trends, and demand forecasting accuracy."], ["4", "Cross-module pattern synthesis", "The unique capability of NetSuite — correlating financial, operational, and CRM data in one system. Example: identifying which customer segments have the highest order frequency, the shortest payment cycles, and the lowest return rates simultaneously."], ["5", "Budget variance analysis", "Goes beyond standard budget vs. actual reporting to identify which variance categories are structural (persistent across periods) vs. timing-related (catch-up in subsequent periods). Enables more accurate forecasting."], ["6", "Executive performance narrative", "Monthly synthesis of business performance across all NetSuite modules into a CEO and board-ready narrative. Replaces the 15-30 hours of manual data assembly that most CFOs perform before board meetings."]], "model": [["Entry price", "$5,500/mo for companies doing $10M-$50M in revenue. At a $25M company, this is 0.26% of revenue. The first synthesis report typically identifies $150K-$500K in working capital release or margin recovery."], ["Scale pricing", "$7,000-$12,000/mo for companies doing $50M-$200M. Scales with module complexity — companies using NetSuite CRM, Manufacturing, and Projects pay more than those using basic financials only."], ["Delivery", "Monthly intelligence brief + quarterly board narrative. The quarterly board narrative is formatted specifically for NetSuite customers who are presenting to PE, family office, or institutional board members — a major value driver."], ["Onboarding", "NetSuite API via SuiteCloud. NetSuite has a well-documented REST API and SuiteScript environment. Integration setup: 2-4 weeks depending on module complexity. First insights at day 30."], ["Human layer", "One senior analyst per 7-9 NetSuite clients. NetSuite implementation or financial operations background required. A former NetSuite Administrator or financial controller who has managed a NetSuite implementation is the ideal profile."], ["Unit economics", "12 clients x $7,500/mo = $90K MRR / $1.08M ARR. NetSuite clients are highly sticky — the integration is deep and the context accumulated over time is difficult to transfer. Gross margin: 67-72%."]], "risks": ["NetSuite module adoption varies significantly. Some clients use only financials and inventory. Others use CRM, Manufacturing, Projects, and Payroll. Your intelligence capability scales with module adoption — set accurate expectations during onboarding about which synthesis products are possible given their specific NetSuite configuration.", "The industry vertical matters for the synthesis narrative. A NetSuite-based manufacturer needs different synthesis than a NetSuite-based professional services firm. Consider specializing by industry within the NetSuite ecosystem.", "NetSuite VARs are your most important GTM channel — and your potential competition. NetSuite VARs implement and support the ERP. Many want to offer analytics but lack the capability. A referral partnership beats a competitive relationship every time."], "ecosystem": [["SuiteAnalytics Workbook (native)", "NetSuite's built-in analytics and reporting module", "Powerful if you have a trained NetSuite administrator. Requires significant configuration. Produces dashboards the user must interpret. Most customers use it for basic financial reports only."], ["NetSuite VARs", "NetSuite implementation and support partners", "Implement and support the ERP. Do not provide continuous data synthesis. Some VARs offer ad-hoc reporting services but not continuous intelligence. Your partnership opportunity rather than competition."], ["Tableau, Power BI connected to NetSuite", "Business intelligence and visualization tools", "Require a data analyst to build and maintain. Mid-market NetSuite customers do not have data analysts. The tool produces dashboards that require interpretation. The synthesis gap remains open."]], "gtm": [["SuiteWorld conference is your annual anchor event", "SuiteWorld is Oracle NetSuite's annual conference with 7,000+ attendees — the single most concentrated gathering of NetSuite customers and partners in the world. A partner session, sponsored content, or expo booth reaches more qualified NetSuite prospects than any other single marketing investment."], ["SuiteCloud Developer Network partner program", "Joining the SuiteCloud Developer Network as a certified partner gives you a listing in the NetSuite partner ecosystem, access to NetSuite customer referrals, and co-marketing opportunities with Oracle."], ["VAR referral partnership strategy", "There are 400+ NetSuite VARs globally. The top 100 each manage 50-200 active NetSuite implementations. A referral relationship with 10-20 VARs who position you as their intelligence partner generates warm introductions continuously."], ["Free cross-module analysis as door-opener", "Pull 12 months of NetSuite data and produce a 6-page cross-module analysis: which customers are truly most profitable after full cost allocation, which inventory is tying up disproportionate working capital, and which budget variances are structural vs. timing. Most companies find at least one significant surprise in all three areas."], ["Industry vertical specialization within NetSuite", "NetSuite intelligence for distribution companies or NetSuite intelligence for professional services firms is a sharper positioning than NetSuite analytics broadly. Specialize by industry first to build benchmark data and credibility, then expand to adjacent industries."]], "milestones": "<strong>Month 1-3:</strong> Build NetSuite API integration. Join SuiteCloud Developer Network. Run 3 free cross-module analyses. Target first 2-3 paid clients.<br><br><strong>Month 3-6:</strong> 6-8 clients. First VAR referral partnership established. Deliver first board narrative deliverables. Target $40-60K MRR.<br><br><strong>Month 6-9:</strong> 10-14 clients. Attend SuiteWorld. Publish vertical-specific benchmark report. Target $75-100K MRR.<br><br><strong>Month 9-12:</strong> 15-20 clients. Second analyst hire. Expand to second industry vertical within NetSuite ecosystem. Target $115-150K MRR."}, {"id": "restaurant365", "rank": 4, "tier": 1, "name": "Restaurant365", "industryTag": "Multi-unit restaurant groups", "encroach": "low", "hook": "The back-office platform for serious multi-unit operators. Captures actual vs. theoretical food cost, labor by position, location P&L, AP, and scheduling — the data that matters most to margin.", "scores": {"data": 91, "gap": 86, "pays": 88, "community": 82, "api": 83}, "stats": [["6,500+", "Restaurant groups on R365"], ["5-50 locations", "Typical customer size"], ["$8M-$80M", "Typical customer revenue"]], "sweet": "Multi-unit restaurant groups with 5-50 locations running Restaurant365 for back-office operations. These operators chose R365 specifically because they care about food cost and operational financial management — which means they are already data-oriented. But they have R365 producing reports, not intelligence.", "why": [["Food cost inflation has made actual-vs-theoretical synthesis critical", "Post-2022 food cost inflation means that even small actual-vs-theoretical gaps represent significant dollar amounts. A 1.5% actual-vs-theoretical gap on a $500K monthly food spend is $7,500/month — $90K/year."], ["R365 adoption is growing fast, creating a large addressable market", "Restaurant365 has been growing rapidly as the preferred back-office platform for serious multi-unit operators. A growing installed base means a growing market for intelligence services built on top of R365 data."], ["Labor complexity post-COVID requires synthesis, not just tracking", "Restaurants are managing minimum wage increases, tip credit complications, scheduling compliance requirements, and labor efficiency simultaneously. R365's scheduling and labor data, correlated with actual sales performance, provides the most actionable labor intelligence available — but nobody is synthesizing it."]], "captures": [{"n": "Actual vs. theoretical food cost", "body": "The single most valuable data point in restaurant operations: every menu item's theoretical cost based on recipe costing vs. the actual food cost incurred. R365 calculates this automatically when properly configured. The gap — and its causes — are almost never synthesized across locations.", "chips": ["Actual vs. theoretical by item", "Variance by location", "Category-level analysis", "Waste & transfer data", "Supplier invoice correlation", "Recipe adherence indicators"]}, {"n": "Labor cost by position & day-part", "body": "Every shift, every labor hour, every overtime event, every position type. R365's scheduling module captures planned vs. actual labor by position and day-part. Nobody synthesizes which scheduling patterns across locations produce the best labor cost percentage.", "chips": ["Labor hours by position", "Day-part scheduling patterns", "Overtime frequency", "Variance to sales", "Manager scheduling decisions", "Labor vs. sales correlation"]}, {"n": "Location P&L updated daily", "body": "R365 produces a fully allocated P&L per location, updated daily. Most operators review this weekly or monthly. Nobody synthesizes which line items across the portfolio are trending in concerning directions — or which locations have cost structures that are structurally diverging from the group average.", "chips": ["Daily P&L by location", "Prime cost analysis", "Fixed vs variable costs", "Period-over-period trends", "Peer location comparison", "NOI contribution"]}, {"n": "Accounts payable & vendor data", "body": "Every supplier invoice, every payment, every credit, every price change by item. R365's AP module is the most comprehensive picture of vendor relationships available in the restaurant tech stack. Cumulative price change analysis across vendors is almost never done.", "chips": ["Invoice & payment history", "Price change by item & vendor", "Vendor delivery performance", "Credit & return history", "Category spend trends", "Contract compliance"]}], "synth": [["1", "Food cost variance intelligence", "Synthesizes actual-vs-theoretical data by item, by location, and over time to identify the specific items and locations driving variance. Correlates variance with waste logs, transfer records, and supplier invoice data to identify whether the root cause is portioning, waste, theft, or supplier pricing."], ["2", "Labor efficiency patterns", "Identifies which scheduling patterns across locations produce the best labor cost percentage — controlling for day-part, sales volume, and menu complexity. Surfaces which locations are systematically over-scheduling and which managers make the most efficient scheduling decisions."], ["3", "Location P&L synthesis", "Identifies locations whose P&L trajectory is diverging from the group average — in either direction. Surfaces the specific line items driving divergence and correlates them with operational variables."], ["4", "Vendor & supplier intelligence", "Synthesizes 18 months of AP data to identify cumulative price changes by vendor and item. Identifies which supplier relationships are producing the most cost creep. Enables data-driven negotiation conversations backed by specific pricing history."], ["5", "Prime cost optimization", "Synthesizes food and labor cost simultaneously to identify the optimal operating range for prime cost by location type, day-part, and menu category. Identifies locations operating outside optimal range and the specific drivers of the deviation."], ["6", "Operator performance narrative", "Monthly synthesis of group-wide operational performance into an operator and investor-ready narrative: food cost performance, labor efficiency, location health distribution, and vendor relationship trends."]], "model": [["Entry price", "$3,500/mo for groups with 5-12 locations. At a 10-location group doing $15M in revenue with 28% food cost, this protects $4.2M in food cost for $42K/year — 1% of food cost spend."], ["Scale pricing", "$400-$600 per additional location above 12. A 25-location group pays $9,000-$12,000/mo."], ["Delivery", "Monthly intelligence brief + bi-weekly food cost flash. The bi-weekly flash is a single-page actual-vs-theoretical alert covering the previous 2-week period. Fast enough to catch portioning issues before they compound."], ["Onboarding", "R365 API connection. Restaurant365 has a documented API with formal partner program access. Setup: 2-3 weeks. Requires proper R365 configuration (recipe costing must be set up) — assess this during discovery. First insights at day 21."], ["Human layer", "One senior analyst per 9-12 restaurant group clients. Restaurant operations background with food cost management experience required."], ["Unit economics", "14 clients x $6,000/mo = $84K MRR / $1.0M ARR. R365 clients are highly sticky because the integration is deep and the food cost intelligence is operationally critical. Gross margin: 68-72%."]], "risks": ["Recipe costing configuration is a prerequisite. If an R365 client has not properly configured their recipe costing module, your food cost variance analysis will not be valid. Assess configuration completeness during discovery. Budget 2-4 weeks to help the client fix configuration gaps before your first report.", "Your ICP is the profitable, growing group — not the distressed operator. A struggling restaurant group with cash flow problems will not pay $4K/mo for intelligence services. Target groups that are profitable, growing, and either preparing for a transaction or opening new locations.", "R365 and Toast/Aloha together are more powerful than R365 alone. R365 captures the back-office; POS captures the front-of-house. The full picture requires both. Build a complementary POS integration early so you can offer complete intelligence, not just back-office analysis."], "ecosystem": [["R365 Reporting (native)", "Built-in P&L and food cost reporting dashboards", "Produces location-level P&L and food cost reports. Requires manual interpretation. No cross-location synthesis. No narrative intelligence. No forward-looking signals. Their reports are the input to your synthesis — not a substitute for it."], ["Margin Edge", "Food cost management platform", "Specializes in actual-vs-theoretical food cost tracking. Single-function tool. No labor, no AP, no P&L synthesis. No narrative intelligence layer. A point solution that complements R365 — not a competitor to your service."], ["Restaurant consultants", "Operational improvement consulting", "Periodic engagements. Walk in, review operations, make recommendations, walk out. No continuous data synthesis from R365."]], "gtm": [["Restaurant365 partner program as your foundation", "R365 has an active partner ecosystem. Join their partner program, get listed in their marketplace, and build relationships with their customer success team. R365's CSMs actively connect customers who need intelligence capabilities with partners who provide them."], ["Free food cost audit as door-opener", "Pull 90 days of R365 data and deliver a food cost variance analysis: actual-vs-theoretical gap by category, top 5 items driving variance, and estimated annual cost of the gap. Most groups find $50K-$200K in annual food cost leakage."], ["Multi-unit restaurant association channels", "The Restaurant Finance & Development Conference (RFDC), Multi-Unit Franchising Conferenc
