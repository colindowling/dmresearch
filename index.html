<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>DataSynth — Intelligence Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0d12;--bg2:#13161f;--bgh:#181c2a;--bga:#1c2135;--br:#252d40;--br2:#30394f;--br3:#4a5878;--tx:#e4e9f7;--tx2:#9ba4c2;--tx3:#5a6480;--ac:#5b8ef8;--acb:rgba(91,142,248,.12);--acr:rgba(91,142,248,.35);--tl:#28c48a;--tlb:rgba(40,196,138,.1);--tlr:rgba(40,196,138,.3);--am:#f0a832;--amb:rgba(240,168,50,.1);--amr:rgba(240,168,50,.3);--rd:#e86060;--rdb:rgba(232,96,96,.1);--rdr:rgba(232,96,96,.3);--sw:210px;--r:10px;--rs:6px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh}
body{background:var(--bg);color:var(--tx);font-family:"IBM Plex Sans",sans-serif;font-size:14px;line-height:1.6;display:flex}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
#sb{width:var(--sw);flex-shrink:0;background:#090b10;border-right:1px solid var(--br);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto}
.sb-logo{padding:20px 16px 14px;border-bottom:1px solid var(--br)}
.sb-mark{font-family:"IBM Plex Serif",serif;font-size:17px;font-weight:500;color:var(--ac)}
.sb-sub{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.12em;margin-top:3px;font-family:"IBM Plex Mono",monospace}
.sb-sec{padding:14px 14px 4px;font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.12em;font-family:"IBM Plex Mono",monospace}
.nav{display:flex;align-items:center;gap:9px;padding:8px 13px;border-radius:var(--rs);margin:1px 6px;cursor:pointer;transition:all .15s;color:var(--tx2);font-size:13px}
.nav:hover{background:var(--bgh);color:var(--tx)}
.nav.on{background:var(--bga);color:var(--ac);font-weight:500}
.ni{width:15px;height:15px;flex-shrink:0;opacity:.65}
.nav.on .ni{opacity:1}
.nb{margin-left:auto;font-size:10px;padding:1px 7px;border-radius:20px;font-family:"IBM Plex Mono",monospace;background:rgba(255,255,255,.05);border:1px solid var(--br);color:var(--tx2)}
.nav.on .nb{background:var(--acb);border-color:var(--acr);color:var(--ac)}
.sb-foot{margin-top:auto;padding:14px 15px;border-top:1px solid var(--br);font-size:11px;color:var(--tx3)}
.sb-foot span{color:var(--tl)}
#main{margin-left:var(--sw);flex:1;min-height:100vh;padding:36px 44px;overflow-x:hidden}
.pg{display:none;animation:fi .18s ease}
.pg.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.ph-eye{font-size:9px;font-weight:500;color:var(--ac);text-transform:uppercase;letter-spacing:.12em;margin-bottom:7px;font-family:"IBM Plex Mono",monospace}
.ph-title{font-family:"IBM Plex Serif",serif;font-size:24px;font-weight:400;color:var(--tx);line-height:1.2;margin-bottom:7px}
.ph-title em{color:var(--ac);font-style:italic}
.ph-desc{color:var(--tx2);font-size:13px;max-width:600px;line-height:1.75;margin-bottom:24px}
.tier-hd{font-size:9px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:.1em;margin:22px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--br);font-family:"IBM Plex Mono",monospace}
.rc{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:border-color .2s;cursor:pointer}
.rc:hover{border-color:var(--br2)}
.rc.open{border-color:var(--br3)}
.rc-top{display:flex;align-items:stretch}
.rc-n{width:48px;display:flex;align-items:center;justify-content:center;font-family:"IBM Plex Mono",monospace;font-size:17px;font-weight:500;color:var(--tx3);border-right:1px solid var(--br);flex-shrink:0}
.rc:hover .rc-n,.rc.open .rc-n{color:var(--tx2)}
.rc-m{flex:1;padding:12px 15px;min-width:0}
.rc-h{display:flex;align-items:center;gap:7px;margin-bottom:4px;flex-wrap:wrap}
.rc-name{font-size:14px;font-weight:500;color:var(--tx)}
.rc-hook{font-size:12px;color:var(--tx2);line-height:1.6}
.rc-sc{width:165px;flex-shrink:0;padding:10px 13px;border-left:1px solid var(--br);display:flex;flex-direction:column;gap:5px;justify-content:center}
.sr{display:flex;align-items:center;gap:6px}
.sl{font-size:9px;color:var(--tx2);width:40px;flex-shrink:0;font-family:"IBM Plex Mono",monospace;text-transform:uppercase}
.st{flex:1;height:4px;background:var(--br);border-radius:2px;overflow:hidden}
.sf{height:100%;border-radius:2px;width:0;transition:width .5s cubic-bezier(.4,0,.2,1)}
.rc.open .sf,.rc:hover .sf{width:var(--w)!important}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;font-family:"IBM Plex Mono",monospace;border:1px solid;white-space:nowrap}
.t-ok{background:var(--tlb);border-color:var(--tlr);color:#3dd4a0}
.t-lo{background:var(--tlb);border-color:var(--tlr);color:#3dd4a0}
.t-md{background:var(--amb);border-color:var(--amr);color:#f5b840}
.t-hi{background:var(--rdb);border-color:var(--rdr);color:#f07070}
.t-df{background:rgba(255,255,255,.05);border-color:var(--br2);color:var(--tx2)}
.rc-det{display:none;border-top:1px solid var(--br);padding:15px 18px;background:rgba(0,0,0,.2)}
.rc.open .rc-det{display:block}
.dg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:10px}
.dl{font-size:9px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;font-family:"IBM Plex Mono",monospace}
.dt{font-size:12px;color:var(--tx2);line-height:1.75}
.dt strong{font-weight:500;color:var(--tx)}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.chip{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid var(--br2);color:var(--tx2)}
.hn{background:rgba(0,0,0,.2);border-left:2px solid var(--am);padding:8px 12px;margin-top:10px;font-size:12px;color:var(--tx2);line-height:1.7;border-radius:0 var(--rs) var(--rs) 0}
.hn strong{font-weight:500;color:var(--tx)}
.go-btn{margin-top:10px;display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:6px 14px;border:1px solid var(--acr);border-radius:var(--rs);color:var(--ac);background:var(--acb);cursor:pointer;transition:all .15s}
.go-btn:hover{background:rgba(91,142,248,.2)}
.bc{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--tx3);margin-bottom:18px;cursor:pointer}
.bc:hover .bcb{color:var(--ac)}
.bcb{color:var(--tx2);transition:color .15s}
.tabs{display:flex;border-bottom:1px solid var(--br);margin-bottom:20px;overflow-x:auto}
.tab{padding:8px 16px;font-size:12px;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--ac);border-bottom-color:var(--ac);font-weight:500}
.tp{display:none}
.tp.on{display:block}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.sb2{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:14px;text-align:center}
.sn{font-family:"IBM Plex Mono",monospace;font-size:21px;color:var(--ac);display:block;margin-bottom:3px}
.sl2{font-size:10px;color:var(--tx2)}
.sec{font-size:9px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:.1em;margin:18px 0 9px;font-family:"IBM Plex Mono",monospace}
.sec:first-child{margin-top:0}
.cc{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:14px;margin-bottom:9px}
.ct{font-size:13px;font-weight:500;color:var(--tx);margin-bottom:5px}
.cb{font-size:12px;color:var(--tx2);line-height:1.75}
.cb strong,.ct strong{font-weight:500;color:var(--tx)}
.ab{background:var(--bg2);border-left:2px solid var(--tl);padding:9px 13px;margin-bottom:9px;font-size:12px;color:var(--tx2);line-height:1.7;border-radius:0 var(--rs) var(--rs) 0}
.ab.w{border-left-color:var(--am)}
.ab strong{font-weight:500;color:var(--tx)}
.dr{display:flex;gap:11px;padding:12px 0;border-bottom:1px solid var(--br)}
.dr:last-child{border-bottom:none}
.ddot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.dt2{font-size:13px;font-weight:500;color:var(--tx);margin-bottom:3px;display:flex;align-items:center;gap:7px}
.db{font-size:12px;color:var(--tx2);line-height:1.65}
.dgap{font-size:11px;color:var(--tl);margin-top:4px;font-style:italic}
.s-n{font-size:10px;padding:1px 7px;border-radius:20px;background:var(--rdb);border:1px solid var(--rdr);color:#f07070}
.s-w{font-size:10px;padding:1px 7px;border-radius:20px;background:var(--amb);border:1px solid var(--amr);color:#f5b840}
.mt{width:100%;border-collapse:collapse}
.mt tr{border-bottom:1px solid var(--br)}
.mt tr:last-child{border-bottom:none}
.mt td{padding:10px 0;font-size:12px;vertical-align:top;line-height:1.7}
.mt td:first-child{color:var(--tx2);width:120px;font-family:"IBM Plex Mono",monospace;font-size:10px;text-transform:uppercase;padding-right:14px;padding-top:13px}
.mt td:last-child{color:var(--tx2)}
.mt td:last-child strong{font-weight:500;color:var(--tx)}
.cot{width:100%;border-collapse:collapse;font-size:12px}
.cot th{font-size:9px;color:var(--tx2);text-align:left;padding:7px 11px;border-bottom:1px solid var(--br2);text-transform:uppercase;letter-spacing:.08em;font-family:"IBM Plex Mono",monospace}
.cot td{padding:9px 11px;color:var(--tx2);border-bottom:1px solid var(--br);vertical-align:top;line-height:1.6}
.cot tr:last-child td{border-bottom:none}
.yr td{color:var(--tx)}
.yr td:first-child{color:var(--ac);font-weight:500}
.t-r{color:#f07070}
.t-g{color:var(--tl)}
.gs{display:flex;gap:13px;margin-bottom:13px;align-items:flex-start}
.gn{width:26px;height:26px;border-radius:50%;background:var(--bg);border:1px solid var(--br2);font-size:10px;font-weight:500;color:var(--tx2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:"IBM Plex Mono",monospace}
.gtt{font-size:13px;font-weight:500;color:var(--tx);margin-bottom:2px}
.gd{font-size:12px;color:var(--tx2);line-height:1.65}
.hsg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.hs{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:15px;text-align:center}
.hsn{font-family:"IBM Plex Mono",monospace;font-size:22px;color:var(--ac);display:block;margin-bottom:3px}
.hsl{font-size:10px;color:var(--tx2)}
.mp{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.mc{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:16px}
.mbg{display:inline-block;font-size:10px;padding:2px 9px;border-radius:20px;margin-bottom:9px;font-family:"IBM Plex Mono",monospace;border:1px solid}
.mb1{background:rgba(91,142,248,.1);border-color:var(--acr);color:#7aaafb}
.mb2{background:rgba(157,143,245,.1);border-color:rgba(157,143,245,.3);color:#b8aff8}
.mct{font-family:"IBM Plex Serif",serif;font-size:15px;color:var(--tx);margin-bottom:7px}
.mcb{font-size:12px;color:var(--tx2);line-height:1.75}
.mcb strong{font-weight:500;color:var(--tx)}
.ncg{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.nc{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .2s}
.nc:hover{border-color:var(--ac);background:var(--bgh)}
.ncn{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--tx3);margin-bottom:7px}
.nct{font-size:13px;font-weight:500;color:var(--tx);margin-bottom:3px}
.ncd{font-size:11px;color:var(--tx2);line-height:1.55}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:18px}
.col{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:16px}
.colt{font-size:13px;font-weight:500;color:var(--tx);margin-bottom:11px;padding-bottom:8px;border-bottom:1px solid var(--br)}
.crow{display:flex;gap:8px;margin-bottom:8px}
.cdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.ctxt{font-size:12px;color:var(--tx2);line-height:1.6}
.ctxt strong{font-weight:500;color:var(--tx)}
.vb{border-left:2px solid var(--tl);background:var(--bg2);border-radius:0 var(--r) var(--r) 0;padding:14px 16px;font-size:13px;color:var(--tx2);line-height:1.75}
.vb strong{font-weight:500;color:var(--tx)}
.adv{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:15px;margin-bottom:9px}
.advt{font-size:13px;font-weight:500;color:var(--tx);margin-bottom:5px}
.advb{font-size:12px;color:var(--tx2);line-height:1.75}
.advb strong{font-weight:500;color:var(--tx)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px}
</style>
</head>

<script>
const IND = [{"id": "restaurants", "rank": 1, "tier": 1, "name": "Multi-unit restaurant groups", "confirmed": false, "hook": "POS data is the richest operational stream in any consumer business. 5-50 location operators are drowning in it and blind to patterns across their portfolio.", "scores": {"data": 98, "gap": 95, "pays": 85, "density": 97}, "stats": [["500K+", "US restaurant locations"], ["~8K", "Groups 5-50 locations"], ["$1.1T", "US industry revenue"]], "sweet": "Groups with 5-50 locations doing $8M-$80M. The 5-50 band is where complexity has outpaced intuition and a $6K/mo intelligence service is a rounding error against the stakes.", "why": [["Labor and food cost pressure at historic highs", "Post-COVID operators manage food cost inflation, rising minimum wages, and delivery platform margin compression simultaneously. Every decision must be defended with data."], ["Restaurant PE consolidation accelerating", "Private equity is buying multi-unit groups at scale. New ownership immediately asks: which locations are truly profitable? Which menu categories drag group margins?"], ["Third-party delivery created an unanalyzed data layer", "DoorDash, Uber Eats, and Grubhub each provide separate performance data. Nobody correlates delivery performance with in-store labor patterns, food cost variance, and satisfaction simultaneously."]], "data": [{"n": "POS transaction data", "lvl": "weak", "dot": "#28c48a", "body": "Every ticket, item, modifier, void, comp, and discount across every location. A 15-location group processes 3,000-8,000 tickets per day. Operators see daily sales totals. Nobody synthesizes item-level patterns across locations.", "gap": "Which menu items grow in order frequency but decline in margin due to portion creep or ingredient cost shifts?"}, {"n": "Labor scheduling & timecards", "lvl": "none", "dot": "#5b8ef8", "body": "7shifts, HotSchedules, Homebase capture every shift, clock-in, clock-out, and overtime event. Labor cost % tracked weekly. Cross-location scheduling efficiency patterns never analyzed.", "gap": "Which locations consistently over-schedule for Sunday brunch vs. their actual cover count — and how much does that erode weekly labor cost?"}, {"n": "Food cost & waste logs", "lvl": "none", "dot": "#f0a832", "body": "Restaurant365, Margin Edge capture actual vs. theoretical food cost, waste logs, transfer records, and supplier invoices by item. Most valuable and most neglected dataset in the restaurant stack.", "gap": "Which locations have actual-vs-theoretical food cost variance trending above 3% — 60 days before it shows in monthly P&L?"}, {"n": "Reservation & guest data", "lvl": "weak", "dot": "#9d8ff5", "body": "OpenTable, Resy capture covers, no-show rates, party sizes, table turn times, and repeat guest frequency. Cross-referenced with sales data only by the most sophisticated operators.", "gap": "Which day-part and party-size combinations produce the highest per-cover average across all locations?"}, {"n": "Third-party delivery data", "lvl": "none", "dot": "#f07060", "body": "DoorDash, Uber Eats, Grubhub each provide separate reporting portals. Commission rates, cancellation rates, prep time scores all exist in silos.", "gap": "When in-store kitchen is at 85% capacity, which delivery platform SLA is being missed first — and what does that do to brand ratings over 90 days?"}, {"n": "Supplier invoices & pricing", "lvl": "none", "dot": "#40c070", "body": "AP data captures every supplier invoice and price change. Operators notice when a key ingredient spikes. Nobody tracks slow-creeping price increases across 40 suppliers over 18 months.", "gap": "Which suppliers have seen cumulative price increases above 12% in 18 months — and which categories have lower-cost alternatives at comparable quality?"}], "synth": [["1", "Menu margin intelligence", "Correlates item-level sales volume, theoretical vs. actual food cost, and modifier attach rates across all locations. Identifies items growing in popularity but declining in contribution margin."], ["2", "Location health scoring", "Synthesizes food cost variance, labor cost %, table turn time, guest return rate, and review sentiment into a weekly health score per location. Flags locations trending toward underperformance 60-90 days before it is visible in the monthly P&L."], ["3", "Labor efficiency patterns", "Identifies which locations consistently over- or under-schedule for specific day-parts, which shift managers produce the lowest overtime cost, and which scheduling patterns correlate with highest guest satisfaction."], ["4", "Supplier risk radar", "Tracks cumulative price changes across all supplier relationships. Identifies vendors delivering quality variance. Surfaces which relationships have lower-cost market alternatives. Delivered quarterly as a supplier negotiation brief."], ["5", "Guest retention synthesis", "Synthesizes guest return frequency, average frequency decline curves, and location-specific retention rates. Identifies which locations have retention rates 15%+ below the group average."], ["6", "Delivery platform intelligence", "Consolidates performance data across all delivery platforms, correlates prep time and cancellation rates with kitchen capacity, identifies which platforms produce the highest LTV customers."]], "model": [["Entry price", "$4,000/mo for 1-5 locations. At a group doing $12M in revenue, this is 0.4% of revenue. The first report typically surfaces $80K-$250K in recoverable margin."], ["Scale pricing", "$600-$800 per additional location above 5. A 15-location group pays ~$10,000-$12,000/mo."], ["Delivery", "Monthly intelligence brief + bi-weekly food cost flash. No dashboards. No logins. 10-15 page synthesis delivered to the owner/operator and each GM."], ["Onboarding", "API to POS + R365/Margin Edge + labor platform. Most integrations take 1-2 weeks. First insights at day 21."], ["Human layer", "One senior analyst per 8-10 restaurant group clients. Hire from multi-unit operations — a former regional manager or director of finance from a restaurant group is worth more than a data scientist."], ["Unit economics", "15 clients x $8,000/mo = $120K MRR / $1.44M ARR. Analyst cost: $85-100K. Infrastructure: $12K/yr. Gross margin: 68-72%."]], "risks": ["Fragmented tech stacks. A 15-location group might run 3 different POS systems from legacy acquisitions. Build integrations for the top 5 platforms (Toast, Aloha, Square, Lightspeed, Revel) before selling.", "Owner-operator vs. professional management. Family-owned groups with the founder still operating may resist external intelligence. Target professionally-managed or PE-backed operators.", "Seasonal sales cycles. Do not pitch in November-December or July-August. January-February and September-October are your windows."], "comp": [["Restaurant365", "Back-office accounting & food cost platform", "Captures data. Produces reports. Has no synthesis layer, no narrative, no forward-looking signals.", false], ["Crunchtime / Apicbase", "Food cost & inventory tools", "Point solutions focused on food cost control only. No cross-function synthesis.", false], ["Restaurant consultants", "Operational improvement consulting", "$30K-$80K per episodic engagement. Observation-based. No continuous data synthesis.", false], ["You", "Continuous cross-system synthesis", "No dashboards. No logins. A human analyst reads every data source simultaneously and delivers what it means weekly and monthly.", true]], "gtm": [["Target groups in active growth or pre-transaction mode", "Multi-unit groups actively opening new locations or being prepared for sale are your warmest prospects. Both conditions create urgency that 'let us think about it' does not survive."], ["Free food cost audit as door-opener", "Pull 30 days of R365 data. Deliver a 5-page report: actual vs. theoretical gap, top 5 items contributing to variance, estimated annual cost. Close rate: 60-70%."], ["Multi-unit restaurant owner communities", "MUFSO conference, the Restaurant Finance & Development Conference, and the NRA Show are your channels. One speaking slot is worth 500 cold emails."], ["Restaurant365 and Toast partner channels", "Both platforms have partner ecosystems. A listing as an analytics partner generates inbound from operators already investing in operational infrastructure."], ["Price anchored to food cost recovery", "A 15-location group with a 1.5% food cost gap is leaving $180K/year on the table. Your service at $120K/yr pays for itself in recovered food cost alone."]], "milestones": "<strong>Month 1-3:</strong> Build integrations for Toast, R365, and 7shifts. Run 3 free food cost audits. Target first 2 paid clients.<br><br><strong>Month 3-6:</strong> 5 paying clients. Deliver first monthly briefs. Target $35-45K MRR.<br><br><strong>Month 6-9:</strong> 8-10 clients. Publish anonymized benchmark data. Target $65-80K MRR.<br><br><strong>Month 9-12:</strong> 12-18 clients. Second analyst hire. Target $100-130K MRR at 68%+ gross margin."}, {"id": "manufacturing", "rank": 2, "tier": 1, "name": "Manufacturing (mid-market)", "confirmed": false, "hook": "ERPs capture everything from machine downtime to defect rates to supplier performance. The synthesis gap is enormous. Buyers have established software budgets and understand ROI math cold.", "scores": {"data": 93, "gap": 91, "pays": 92, "density": 90}, "stats": [["250K+", "US manufacturers"], ["~30K", "In $10M-$200M sweet spot"], ["$2.3T", "US manufacturing output"]], "sweet": "Manufacturers doing $10M-$200M with 50-500 employees. Large enough to run a real ERP (SAP B1, Epicor, Infor, NetSuite) with years of operational data. Small enough to have no internal BI team. The CFO runs Excel reports. The COO manages by walking the floor.", "why": [["Supply chain disruption exposed operational blind spots", "COVID-era supply chain chaos revealed most mid-market manufacturers had no early warning systems for supplier risk or demand shift. Operators are actively investing in intelligence infrastructure that would have seen those problems coming."], ["Margin compression from input cost inflation", "Material costs, freight, and energy have all inflated significantly. Every cost center is under scrutiny. Intelligence identifying hidden margin leakage by product, by line, by customer is a direct response to an active pain."], ["Labor tightening makes operational efficiency critical", "Finding and retaining skilled manufacturing labor is harder than ever. Operators need to understand which lines, shifts, and product types generate the highest output per labor dollar — data they have in their ERP and are not reading."]], "data": [{"n": "Production & OEE data", "lvl": "weak", "dot": "#28c48a", "body": "Every production order, every work center, every run rate, every downtime event. MES or ERP captures machine utilization, OEE, cycle time vs. standard, and scrap by operation. Read by plant managers in aggregate. Cross-product pattern synthesis almost never done.", "gap": "Which product families consistently run at 85% of standard cycle time — and what does that tell us about tooling, operator skill, or setup procedure gaps?"}, {"n": "Quality & defect logs", "lvl": "none", "dot": "#5b8ef8", "body": "QMS or ERP quality modules capture every inspection result, every nonconformance report, every return, every customer complaint. Tracked for compliance. Almost never synthesized across products, customers, and periods to identify systemic patterns.", "gap": "Which specific suppliers are responsible for 60% of incoming material nonconformances — and how much is that costing in rework, scrap, and returns over 18 months?"}, {"n": "Supplier performance records", "lvl": "weak", "dot": "#f0a832", "body": "Purchase orders, goods receipts, supplier invoices, delivery records, and quality incidents by supplier all exist in the ERP. On-time delivery tracked at summary level. Deep synthesis across quality, delivery, pricing, and responsiveness almost never done.", "gap": "Which of our top 20 suppliers have had delivery performance degradation above 8% in 6 months — a leading indicator of supply disruption in the next quarter?"}, {"n": "Customer order & profitability", "lvl": "weak", "dot": "#9d8ff5", "body": "Sales orders, customer pricing, discount history, special handling, return history, and rush order frequency all in the ERP. Manufacturers know their biggest customers by revenue. They almost never know them by actual contribution margin after full cost allocation.", "gap": "Which of our top 10 customers are actually margin-negative after allocating rush order cost, special handling, and quality claim credits?"}, {"n": "Labor efficiency by line & shift", "lvl": "none", "dot": "#f07060", "body": "Time and attendance or ERP labor modules capture hours worked by operation, work center, and employee. Cross-shift efficiency patterns and their correlation with supervisory assignments never analyzed.", "gap": "The second shift consistently runs 12% above standard labor hours on the same products as first shift. Is it the supervisor, crew tenure, maintenance schedule, or something else?"}, {"n": "Inventory & working capital", "lvl": "weak", "dot": "#40c070", "body": "Inventory aging, slow-moving stock, safety stock levels, and material consumption rates all exist in ERP. Most manufacturers review inventory quarterly. Real-time working capital intelligence rarely produced.", "gap": "We have $2.1M in slow-moving finished goods inventory. Which items have been sitting over 120 days and what is the carrying cost vs. margin recovered by discounting now?"}], "synth": [["1", "Product profitability intelligence", "Allocates actual labor, material, overhead, quality cost, and special handling to every product family. Surfaces which products are margin contributors vs. destroyers after full cost allocation — a picture most manufacturers have never seen."], ["2", "Supplier risk radar", "Synthesizes delivery performance trends, incoming quality data, pricing history, and responsiveness patterns for every active supplier. Identifies which relationships are degrading 90 days before disruption becomes visible."], ["3", "OEE pattern intelligence", "Identifies which equipment, shifts, and product setups consistently underperform OEE targets and correlates those patterns with maintenance history, operator assignments, and material lot data. A narrative answering: why is this machine underperforming?"], ["4", "Customer profitability synthesis", "Full-cost allocation to every customer relationship — including rush premiums, quality claim costs, special packaging, delivery frequency, and payment terms cost. Identifies which customers are worth growing and which need repricing."], ["5", "Working capital intelligence", "Synthesizes inventory aging, payment terms, and receivables patterns to identify where working capital is trapped unnecessarily. Prioritizes slow-moving inventory for liquidation decisions."], ["6", "Quality cost analysis", "Quantifies the full cost of quality — internal failure, external failure, and appraisal cost — by product, by customer, and by supplier. Turns quality into a financial lens that identifies where defect prevention investment has the highest ROI."]], "model": [["Entry price", "$5,000/mo for a single facility. At a $25M manufacturer, this is 0.24% of revenue. The first report typically identifies $150K-$500K in recoverable margin."], ["Scale pricing", "$2,500-$4,000 per additional facility. A 3-plant manufacturer pays $10,000-$13,000/mo with cross-plant comparative intelligence as additional value."], ["Delivery", "Monthly operational brief + quarterly strategic deep dive. Monthly covers leading indicators. Quarterly covers product profitability, customer profitability, and working capital optimization."], ["Onboarding", "ERP data connection + 90-day historical pull. For SAP B1, Epicor, Infor, NetSuite — API or data export setup takes 2-4 weeks. First insights at day 30."], ["Human layer", "One senior analyst per 6-8 manufacturing clients. Manufacturing operations background is essential. Hire from plant management, operations consulting, or supply chain roles."], ["Unit economics", "15 clients x $7,500/mo = $112K MRR / $1.35M ARR. Manufacturing analysts are more expensive (~$100-120K) — price accordingly. Gross margin: 65-70%."]], "risks": ["ERP variety is real. Mid-market manufacturing runs on SAP B1, Epicor, Infor, NetSuite, Macola, and dozens of others. Build integrations for the top 4 first before you sell.", "Manufacturing type matters significantly. Discrete manufacturers are very different from process or job shop manufacturers. Pick one type to start and build credibility before expanding.", "The COO is your champion, the CFO is your buyer. COOs understand the operational pain. CFOs sign the check. You need both in the room for the close."], "comp": [["ERP vendors (SAP, Epicor, etc.)", "Built-in reporting & analytics modules", "Produce historical reports by module. No cross-module synthesis. No narrative. No forward-looking signals.", false], ["Power BI / Tableau on ERP", "Self-service visualization platforms", "Require a data analyst to build and maintain — which mid-market manufacturers do not have. Tools sit unused or produce dashboards nobody acts on.", false], ["Operations consultants", "Periodic operational improvement engagements", "$50K-$200K per engagement. Observation-based, not data-driven. Walk in, make recommendations, walk out.", false], ["You", "Continuous ERP synthesis", "No dashboards. No analysts to hire. A manufacturing-experienced intelligence team reads your ERP data continuously and delivers what it means — in plain language — every month.", true]], "gtm": [["Target manufacturers during ERP upgrades or post-acquisition", "A manufacturer that just went live on a new ERP has the cleanest data they have ever had — and no intelligence layer on top of it. Post-acquisition manufacturers need to prove operational performance to new ownership."], ["Free OEE or supplier risk audit as door-opener", "Pull 90 days of ERP data and deliver a 6-page supplier performance report or OEE pattern analysis. Most manufacturers find at least one significant blind spot. Close rate: 55-65%."], ["Manufacturing associations and trade shows", "NTMA, AME, APICS/ASCM, and industry-specific trade shows are your channels. Regional manufacturing associations in industrial states are dense with mid-market operators."], ["ERP partner channels", "SAP B1, Epicor, Infor, and NetSuite all have VAR partner ecosystems. VARs implement the ERP then have no intelligence offering. A referral relationship with 5-10 ERP VARs generates warm introductions at scale."], ["Frame the ROI in working capital and margin recovery", "Manufacturers respond to three numbers: margin recovery, working capital reduction, and labor efficiency gain. Lead every proposal with a specific estimate derived from their data."]], "milestones": "<strong>Month 1-3:</strong> SAP B1 and NetSuite Manufacturing integrations. Run 2-3 free audits in one sub-vertical. Target first 2 paid clients.<br><br><strong>Month 3-6:</strong> 5 clients. Begin building ERP VAR relationships. Target $35-50K MRR.<br><br><strong>Month 6-9:</strong> 8-10 clients. First benchmark report for your target manufacturing sub-vertical. Target $65-90K MRR.<br><br><strong>Month 9-12:</strong> 12-15 clients. Second analyst hire. Add Epicor integration. Target $100-130K MRR at 65%+ gross margin."}, {"id": "healthcare", "rank": 3, "tier": 1, "name": "Healthcare — physician groups & outpatient networks", "confirmed": false, "hook": "Revenue cycle data, payer mix trends, provider productivity, and patient throughput are all captured and almost never synthesized. Established analytics budgets. High willingness to pay.", "scores": {"data": 95, "gap": 86, "pays": 91, "density": 88}, "stats": [["230K+", "US physician practices"], ["~15K", "Multi-specialty groups $10M-$100M"], ["$4.5T", "US healthcare spending annually"]], "sweet": "Multi-specialty physician groups and outpatient networks doing $10M-$80M in collections. Large enough to have complex payer mix, multiple providers, and multiple locations. Small enough to lack internal analytics staff.", "why": [["Payer reimbursement pressure is accelerating", "Commercial payers are tightening reimbursement rates, changing coverage policies, and adding prior authorization requirements at a pace that makes manual tracking impossible. Groups that do not detect payer-specific degradation early lose hundreds of thousands of dollars before the pattern is visible."], ["Provider burnout and turnover is creating operational instability", "Physician and APP turnover is at historic highs. Each departure costs $500K-$1M in replacement and productivity loss. Intelligence identifying provider productivity patterns suggesting burnout risk before the resignation letter arrives is directly preventative."], ["Revenue cycle complexity has exceeded human capacity", "A 20-provider multi-specialty group submits tens of thousands of claims per month across 15+ payers, each with different fee schedules and denial patterns. Nobody is synthesizing patterns across the entire claims universe."]], "data": [{"n": "Revenue cycle & claims data", "lvl": "weak", "dot": "#28c48a", "body": "Every claim submitted, every payer adjudication, every denial reason code, every write-off, every payment posting. Practice management systems capture this exhaustively. Revenue cycle teams chase individual denials. Nobody synthesizes denial pattern trends across payers, providers, and CPT code clusters.", "gap": "Payer X has increased their claim edit denial rate by 40% over 6 months on a specific CPT code cluster — a pattern that will not be visible in weekly denial reports until it has already cost $180K."}, {"n": "Payer mix & reimbursement trends", "lvl": "none", "dot": "#5b8ef8", "body": "Payer mix by provider, location, and service line is captured in every practice management system. Nobody synthesizes payer mix drift — the slow shift from commercial to Medicare/Medicaid over 18 months that quietly erodes revenue without any single alarm triggering.", "gap": "Our commercial payer mix has drifted from 62% to 54% of collections over 18 months. At current productivity levels, that shift represents $340K in annual revenue erosion — recoverable with targeted referral source development."}, {"n": "Provider productivity & scheduling", "lvl": "weak", "dot": "#f0a832", "body": "Every provider schedule, every appointment type, every no-show, every cancellation, every work RVU generated. Provider productivity reports run monthly. Cross-provider patterns that predict burnout or departure risk almost never analyzed.", "gap": "Dr. X has seen a 22% decline in work RVU production over 4 months while maintaining a full schedule. That pattern has preceded 3 of the last 4 provider departures in this practice. Nobody noticed before the resignation."}, {"n": "Denial & write-off patterns", "lvl": "weak", "dot": "#9d8ff5", "body": "Denial reason codes, denial rates by payer and CPT code, write-off amounts by category, and appeal success rates are all captured. Revenue cycle teams track overall denial rates. The specific combination of payer + code + provider producing the highest denial rate is almost never surfaced.", "gap": "70% of our claims denials are concentrated in 8% of our CPT code volume. Addressing those 8 codes would recover $220K in annual write-offs currently accepted as expected."}, {"n": "Referral source performance", "lvl": "none", "dot": "#f07060", "body": "Every patient referral source and payer are captured in practice management. Most groups know their top 5 referral sources anecdotally. Nobody synthesizes which referral relationships are growing, declining, or producing the highest-margin patient mix.", "gap": "Our second-largest referral source has reduced referrals by 28% over 6 months. They started referring to a new specialist in the area. Nobody knew until we lost $180K in revenue."}, {"n": "Patient throughput & capacity", "lvl": "weak", "dot": "#40c070", "body": "Appointment scheduling, wait times, patient throughput per provider, cancellation patterns, and no-show rates are all captured. Nobody synthesizes capacity utilization patterns across the group to identify unrealized revenue capacity.", "gap": "Location 3 has 14 hours/week of unscheduled capacity in high-margin specialty slots while location 1 has a 6-week wait for the same service. The group leaves $400K in annual revenue on the table from a logistics mismatch."}], "synth": [["1", "Revenue cycle early warning", "Synthesizes claim denial patterns, payer adjudication trends, and write-off rate movements to surface payer-specific reimbursement degradation 60-90 days before it is visible in collections reports."], ["2", "Payer mix intelligence", "Tracks payer mix by provider, location, and service line over rolling 18-month periods. Identifies drift toward lower-reimbursing payers and quantifies the revenue impact of shifts."], ["3", "Provider productivity & retention signals", "Monitors work RVU trends, scheduling patterns, cancellation rates, and patient satisfaction signals by provider over rolling 6-month windows. Identifies productivity decline patterns that historically precede burnout and departure."], ["4", "Denial pattern synthesis", "Identifies the specific CPT code clusters, payer combinations, and provider workflows generating the highest denial concentration. Quantifies the revenue recovery opportunity."], ["5", "Referral relationship intelligence", "Tracks referral volume, payer mix, and patient quality by referral source over rolling 12-month periods. Surfaces early warning signals of referral diversion to competitive practices."], ["6", "Capacity & service line optimization", "Identifies underutilized scheduling capacity by provider, location, and appointment type. Cross-references with wait time data to surface mismatched capacity — where waitlists exist in one location while capacity sits unused in another."]], "model": [["Entry price", "$5,000/mo for a single-specialty group. At a group doing $8M in collections, this is 0.75% of revenue. The first report typically identifies $100K-$400K in recoverable revenue."], ["Scale pricing", "$1,500-$2,500 per additional specialty or location. A 5-specialty, 3-location group pays $10,000-$15,000/mo."], ["Delivery", "Monthly revenue intelligence brief + quarterly strategic review. Monthly covers revenue cycle early warnings, provider productivity flags, and denial trends. Quarterly covers payer mix analysis, referral intelligence, and service line performance."], ["Onboarding", "Practice management system API connection. Epic, athenahealth, and NextGen all have documented API access. 2-4 week setup. Stay on the operational/revenue cycle side — not clinical EHR data."], ["Human layer", "One senior analyst per 6-8 healthcare group clients. Healthcare revenue cycle background essential. HIPAA compliance training required for all analysts handling healthcare data."], ["Unit economics", "12 clients x $8,500/mo = $102K MRR / $1.22M ARR. Healthcare clients pay more and churn less than almost any other vertical. Gross margin: 65-68% after HIPAA compliance infrastructure."]], "risks": ["HIPAA compliance is non-negotiable from day one. Budget $15-25K for compliance infrastructure (BAAs, encryption, access controls, audit logging) before your first healthcare client.", "Stay on the revenue cycle and operational side. Clinical decision support is a completely different regulatory and liability environment. Your product is financial and operational intelligence — never blur that line.", "Sales cycles are longer than other verticals. Healthcare administrators are risk-averse. Expect 60-90 day cycles even with warm introductions. The free revenue cycle audit is your best tool for compressing the cycle."], "comp": [["Epic, athenahealth analytics", "Built-in reporting dashboards", "Produce historical reports by module. No synthesis across modules. The analytics require a trained user to interpret.", false], ["Revenue cycle management companies", "Outsourced billing & collections", "Manage the billing process. Do not synthesize patterns across the revenue cycle to surface strategic intelligence.", false], ["Healthcare consulting firms", "Periodic operational assessments", "$40K-$150K for project-based engagements. Observation and interview-based. No continuous data synthesis.", false], ["You", "Continuous revenue & operational intelligence synthesis", "No dashboards. No logins. A healthcare-experienced analyst reads your practice management data continuously and tells you what it means — what is trending, what is at risk, and what to do.", true]], "gtm": [["Target groups that recently changed practice management systems", "A group that just migrated to Epic or athenahealth has the cleanest data they have ever had and zero synthesis on top of it."], ["Free revenue cycle audit as door-opener", "Offer a 30-day denial pattern analysis. A well-delivered audit consistently surfaces $100K+ in identifiable revenue leakage. Close rate: 55-65%."], ["MGMA and state-level healthcare associations", "MGMA annual conference is the most concentrated gathering of practice administrators and CFOs in the country."], ["Healthcare CPA and consulting firm partnerships", "CPAs who specialize in physician practice management regularly encounter clients with revenue cycle and operational intelligence gaps."], ["Frame pricing against recoverable revenue", "$7,500/mo to identify $300,000 in annual recoverable revenue is a 4x ROI frame no administrator can dismiss."]], "milestones": "<strong>Month 1-3:</strong> HIPAA compliance infrastructure. athenahealth and NextGen integrations. Run 2 free revenue cycle audits. Target first 2 paid clients.<br><br><strong>Month 3-6:</strong> 4-6 clients. Build MGMA conference presence. Target $30-50K MRR.<br><br><strong>Month 6-9:</strong> 8 clients. First referral from a healthcare CPA firm. Target $65-80K MRR.<br><br><strong>Month 9-12:</strong> 10-14 clients. Second analyst hire. Target $90-120K MRR."}, {"id": "automotive", "rank": 4, "tier": 1, "name": "Automotive dealer groups", "confirmed": true, "hook": "$1.2T industry. Massive DMS data across every rooftop. Near-zero cross-group synthesis. Operators who understand ROI math and have real budgets. The competitive white space is wide open.", "scores": {"data": 95, "gap": 93, "pays": 90, "density": 82}, "stats": [["16,957", "Franchised US dealers (NADA 2024)"], ["~2,500", "Multi-rooftop groups (your ICP)"], ["$1.2T", "Total US dealer sales 2024"]], "sweet": "Groups with 3-30 rooftops doing $30M-$300M in revenue. Too big to run on gut instinct. Too small to afford a dedicated data team. A group principal with 8 stores has six DMS logins, four CRM platforms, a spreadsheet-based view of everything, and zero synthesis across the operation.", "why": [["Margin compression is back after the pandemic windfall", "Operating margins hit 8% during the chip shortage. Normalizing back toward the historical 4%. Groups that coasted on inflated vehicle prices are now realizing their operations are not as healthy as the P&L suggested."], ["Consolidation is creating groups that outgrew their management capability", "The top 10 groups are acquiring aggressively. Mid-market groups are either buying or being acquired. In either case, they suddenly need cross-portfolio intelligence they have never had to produce before."], ["Service revenue is the new battleground", "With new-vehicle margins compressing, fixed ops (service and parts) is where the next decade of dealer profitability will be won or lost. That is also where the data is richest and most neglected."]], "data": [{"n": "DMS deal data", "lvl": "weak", "dot": "#28c48a", "body": "Every deal jacket — vehicle, buyer, price, trade, F&I products sold, gross profit, salesperson, desk manager. Groups look at this by store, rarely across stores.", "gap": "Nobody correlates F&I attachment rates by salesperson, store, or customer segment across the group."}, {"n": "Service repair orders (ROs)", "lvl": "none", "dot": "#5b8ef8", "body": "Every service visit: mileage, complaint, cause, correction, parts used, labor hours, tech productivity. Hundreds of ROs per day across a group.", "gap": "Which advisors have declining CSI scores 60 days before the survey? Which locations are hemorrhaging repeat service customers?"}, {"n": "Inventory aging data", "lvl": "weak", "dot": "#f0a832", "body": "Every vehicle on the lot: days in stock, reconditioning cost, price adjustments, market comparables, turn rate.", "gap": "Which sourcing channels produce the fastest turns and highest gross across the entire portfolio?"}, {"n": "CRM & customer history", "lvl": "none", "dot": "#9d8ff5", "body": "Every customer interaction: showroom visits, internet leads, service history, purchase history, equity position, lease maturity.", "gap": "Which customers are statistically likely to buy in 90 days — and which are silently defecting to a competitor?"}, {"n": "F&I performance logs", "lvl": "none", "dot": "#f07060", "body": "Every finance deal: rate reserve, product penetration (VSC, GAP, paint protection), backend gross, lender mix.", "gap": "Which lenders are quietly tightening? Which products are trending toward customer complaint patterns?"}, {"n": "Marketing spend & attribution", "lvl": "none", "dot": "#40c070", "body": "Google Ads, third-party leads, direct mail, OEM co-op funds. Groups know what they spend. They almost never know which channels produced their most profitable deals.", "gap": "Cost-per-profitable-deal by channel, not just cost-per-lead. Exposes where 20-40% of budget is wasted."}], "synth": [["1", "Fixed ops early warning system", "Synthesizes RO data, CSI scores, technician productivity, and advisor behavior to surface which locations are trending toward service customer defection 45-60 days before it shows in the monthly report."], ["2", "Inventory intelligence", "Correlates sourcing channel, reconditioning cost, days to sale, and gross profit across every rooftop. Surfaces patterns like: Vehicles from Manheim Atlanta turn 11 days faster and gross $400 more than your current primary auction source."], ["3", "Customer defection radar", "Mines CRM, service records, and equity data to identify customers statistically likely to defect in the next 90 days. Delivers a prioritized list: These 34 customers are 80%+ likely to buy from a competitor in the next quarter."], ["4", "F&I performance synthesis", "Compares F&I penetration, product mix, backend gross, and lender performance across the group. Surfaces which managers underperform vs. peer group and which products trend toward chargeback risk."], ["5", "Marketing ROI by deal quality", "Traces every sold unit back to its marketing origin and calculates cost-per-profitable-deal. Most groups discover 2-3 channels burning 30-40% of budget on below-average-gross deals."], ["6", "People performance patterns", "Synthesizes salesperson productivity, gross contribution, CSI correlation, and retention trends across stores. A pattern engine that surfaces who is trending toward departure before they resign."]], "model": [["Entry price", "$3,500/mo for 1-4 rooftops. 0.1% of revenue for a $40M group. First report typically surfaces $50K-$200K in recoverable margin."], ["Scale pricing", "$500-$750 per additional rooftop above 4. A 12-store group pays ~$7,000-$8,500/mo."], ["Delivery", "Monthly intelligence brief + quarterly deep dive. No dashboards. No logins. A 12-page synthesis delivered to the group principal and each GM."], ["Onboarding", "DMS API connection + 90-day historical pull. CDK, Reynolds & Reynolds, and Cox all have API programs. 2-4 weeks. First insights at day 30."], ["Human layer", "One senior analyst per 8-10 clients. Former GM, fixed ops director, or dealer performance manager. Not a data scientist."], ["Unit economics", "20 clients x $6,000/mo = $120K MRR / $1.44M ARR. Analyst cost: $90-110K. Infrastructure: $15K/yr. Gross margin: 65-70%."]], "risks": ["DMS API access takes 4-8 weeks. CDK and Reynolds now have formal partner programs — the path exists, but plan for the timeline.", "Top-of-house sale. The buyer is the group principal or COO. Longer access cycle but much lower churn once in.", "Selling seasonality. Best windows: January-February and August-September. Avoid Q4 and peak spring."], "comp": [["CDK Global", "DMS platform + reporting dashboards", "Captures data, produces reports. No cross-store synthesis. No narrative. Tells you what happened, not what is coming.", false], ["Reynolds & Reynolds", "DMS + CRM + fixed ops tools", "Excellent at capturing data. Zero at synthesizing patterns across a group full operation.", false], ["Fixed ops consultants", "On-site process consulting", "$20K-$50K per engagement. Observation-based. No continuous data synthesis.", false], ["OEM performance teams", "Brand-specific performance reporting", "Only covers one brand. Multi-brand groups fly blind. OEM data serves the OEM interests.", false], ["You", "Cross-system synthesis -> narrative intelligence", "No dashboards. No logins. A human analyst who understands dealer economics tells the group principal what the data means, what is trending, and what to do. Continuous.", true]], "gtm": [["Target groups at the moment of acquisition", "Automotive News publishes acquisitions weekly. When a group principal buys their 3rd or 4th store, they have just crossed the complexity threshold where gut feel breaks down."], ["Free intelligence audit as door-opener", "30-day data pull for one store. Deliver a 6-page report: one thing working better than they think, one thing quietly bleeding margin, one trend worth watching. Close rate: 60-70%."], ["Industry channels over cold outreach", "NADA, NCM Associates, Digital Dealer, and CBT News are where principals pay attention. A byline in Automotive News reaches more qualified prospects than 1,000 cold emails."], ["Anchor to specific dollars", "Pitch $180,000 in recoverable margin identified in the first 90 days. Dealers think in gross profit dollars — speak their language."], ["The 20-group strategy", "NCM Associates runs peer performance groups where dealer principals share operational data. One relationship inside a 20-group exposes you to 15-20 group principals simultaneously."]], "milestones": "<strong>Month 1-3:</strong> CDK + Reynolds integrations. One senior analyst with dealer ops background. 3 free audits.<br><br><strong>Month 3-6:</strong> 2 audits convert to paid. Target $18-22K MRR.<br><br><strong>Month 6-9:</strong> 5 paying clients. Begin 20-group referral network. Publish in Automotive News. Target $35-45K MRR.<br><br><strong>Month 9-12:</strong> 8-12 clients. Second analyst hire. Target $60-90K MRR at 65%+ gross margin."}, {"id": "financial", "rank": 5, "tier": 2, "name": "Financial services — community banks & credit unions", "confirmed": false, "hook": "Transaction data, loan portfolio performance, deposit trends, and member behavior — all captured, rarely synthesized. Existing analytics budgets make the sale culturally familiar.", "scores": {"data": 96, "gap": 78, "pays": 94, "density": 91}, "stats": [["4,800", "US community banks"], ["4,900", "US credit unions"], ["$200M-$3B", "Asset range for your ICP"]], "sweet": "Community banks and credit unions with $200M-$3B in assets. Large enough to have rich loan, deposit, and behavioral data across multiple branches. Small enough to lack an internal data science team.", "why": [["Interest rate volatility exposed deposit and loan portfolio blind spots", "The rate cycle of 2022-2024 reshuffled deposit behavior and loan performance in ways that caught many community institutions off guard. Those that detected deposit concentration risk early had time to respond."], ["Fintech competition is eroding core deposit relationships", "Digital banks and fintech apps are capturing checking accounts and savings from community bank customers — often without the institution noticing until the relationship is already diminished."], ["Regulatory pressure is increasing data governance expectations", "Regulators (OCC, FDID, NCUA) place increasing emphasis on data quality, risk monitoring, and board-level reporting. Institutions demonstrating proactive intelligence reduce examination risk."]], "data": [{"n": "Loan portfolio performance", "lvl": "weak", "dot": "#28c48a", "body": "Every loan origination, payment, delinquency, modification, and charge-off. Core banking systems capture this exhaustively. Portfolio quality reported to the board monthly. Granular pattern analysis by loan type, geography, origination channel, and underwriter almost never done.", "gap": "Commercial real estate loans originated in 2021-2022 at compressed rates show early stress signals in 3 specific geographic submarkets. That pattern will not appear in board delinquency reports for another 90 days."}, {"n": "Deposit behavior & mix", "lvl": "none", "dot": "#5b8ef8", "body": "Every account, transaction, balance change, CD maturity, and transfer. Deposit mix reports produced monthly. Customer-level deposit behavior analysis — which customers are rate-sensitive, which are quietly moving balances — almost never synthesized.", "gap": "We have lost $42M in deposits over 6 months from 380 customers who opened accounts at a competing online bank. We do not know which branch relationships they came from or what triggered the move."}, {"n": "Customer/member relationship data", "lvl": "weak", "dot": "#f0a832", "body": "Every product relationship, every service interaction, every complaint, every digital banking login pattern. Core systems capture every touchpoint. Nobody synthesizes the full customer relationship picture to identify which relationships are deepening vs. hollowing out.", "gap": "Our average household relationship has declined from 2.8 products to 2.4 products over 18 months. Nobody knows which customer segments are driving it."}, {"n": "Branch & channel performance", "lvl": "weak", "dot": "#9d8ff5", "body": "Teller transaction data, lobby traffic, account opening by channel, digital adoption rates. Branch performance evaluated on deposits and loan production. Nobody synthesizes which branch experiences correlate with 3-year customer retention rates.", "gap": "Branch 7 has the highest new account opening volume but the lowest 12-month retention rate in the network. The new accounts look good short-term — the attrition is invisible until year two."}, {"n": "Interest rate sensitivity data", "lvl": "none", "dot": "#f07060", "body": "Loan repricing schedules, CD maturity dates, savings rate sensitivity by customer segment, and net interest margin by product type all in the core system. Real-time deposit behavior response to rate changes almost never analyzed.", "gap": "When we raised CD rates last quarter, 34% of the new money came from existing customers moving existing deposits — not new money. That cannibalization cost more in margin than the deposits were worth."}, {"n": "Fee income & service utilization", "lvl": "weak", "dot": "#40c070", "body": "Overdraft fee income, wire transfer volume, merchant services revenue, and wealth referral production all captured. Fee income reported in aggregate. Which customer segments generate the most durable fee income rarely analyzed.", "gap": "Our overdraft fee income from the top 200 fee-generating accounts has declined 40% over 3 years as those customers adopted overdraft protection. We have not developed replacement fee income from any other segment."}], "synth": [["1", "Portfolio risk radar", "Monitors loan portfolio delinquency trends, concentration risk by geography and loan type, and early-stage stress signals in commercial relationships. Surfaces emerging credit quality concerns 60-90 days before they appear in board-level reporting."], ["2", "Deposit attrition intelligence", "Identifies customer segments showing early deposit attrition signals — declining balance trends, reduced transaction frequency, competitor transfer patterns. Delivers a monthly watchlist of high-value relationships at risk."], ["3", "Relationship depth synthesis", "Tracks product penetration and relationship depth per household over rolling 18-month windows. Identifies which customer segments are deepening relationships vs. hollowing out."], ["4", "Net interest margin intelligence", "Synthesizes deposit repricing sensitivity by customer segment, loan repricing schedules, and funding cost trends to forecast NIM compression or expansion 60 days ahead of the monthly report."], ["5", "Branch performance intelligence", "Correlates branch-level new account production with 12-month and 24-month relationship retention rates. Identifies which branches are producing durable relationships vs. high-churn accounts."], ["6", "Fee income sustainability analysis", "Tracks fee income by category, customer segment, and product relationship over time. Identifies which fee income streams are structurally declining vs. growing. Enables proactive revenue diversification."]], "model": [["Entry price", "$5,000/mo for a single-charter institution. At a $400M asset bank, this is 1.5 basis points of assets — less than the cost of a single compliance software subscription."], ["Scale pricing", "1-2 basis points of assets per year. A $1B credit union pays $8,000-$10,000/mo. Pricing in basis points maps to how financial institutions already think about cost."], ["Delivery", "Monthly intelligence brief for the executive team + quarterly board-ready narrative. The quarterly report is formatted to go directly to the board — a major value driver since board reporting is a significant administrative burden."], ["Onboarding", "Core system data connection. Fiserv, Jack Henry, and FIS all have data export and API capabilities. 3-5 week setup. First insights at day 30."], ["Human layer", "One senior analyst per 6-8 financial institution clients. Community banking or credit union operations background required. Former bank CFO, controller, or BSA officer is the ideal profile."], ["Unit economics", "12 clients x $7,000/mo = $84K MRR / $1.0M ARR. Financial institution clients have the lowest churn rate of any vertical — switching an intelligence provider is a significant governance event. Gross margin: 68-73%."]], "risks": ["Regulatory positioning matters. Frame your service as operational and strategic intelligence — not credit underwriting, not CECL modeling, not BSA/AML compliance. Stay clearly on the business intelligence side.", "The synthesis gap is lower than other verticals. Larger community banks (>$1B assets) sometimes have part-time data analysts. Your ICP is $200M-$800M in assets.", "Procurement is slower than private sector. Board approval, IT security review, and legal review of data agreements add 30-60 days to every sales cycle."], "comp": [["Core system vendors (Fiserv, Jack Henry)", "Reporting modules and basic dashboards", "Produce historical reports. No synthesis, no narrative, no forward-looking intelligence.", false], ["PCBB, Vericast, CUNA data services", "Industry benchmarking and peer comparison data", "Provide external benchmarking against peer institutions. Do not synthesize the institution own operational data into specific, actionable intelligence.", false], ["Banking consultants (Cornerstone, Crowe)", "Periodic strategic assessments", "$30K-$100K project engagements. Observation-based. No continuous data synthesis.", false], ["You", "Continuous internal data synthesis -> executive and board intelligence", "No dashboards. No logins. A banking-experienced analyst reads your core system data continuously and delivers specific, forward-looking intelligence to your executive team and board. Monthly.", true]], "gtm": [["Target institutions after a core system conversion", "A bank or credit union that just migrated to a new core system has the cleanest, most accessible data they have ever had — and zero intelligence layer on top of it."], ["Free deposit attrition analysis as door-opener", "Offer a 30-day deposit behavior analysis. Surface which customer segments are showing early attrition signals and quantify the deposit balance at risk."], ["Community banking associations", "ICBA, CUNA, and state banking associations all run annual conferences — hyper-concentrated communities of your exact buyer."], ["Bank and credit union consulting firm referral partnerships", "Accounting firms specializing in financial institution audits (BKD, Plante Moran, Wipfli) regularly advise clients on operational intelligence gaps."], ["Board-ready deliverable as differentiator", "The quarterly board narrative saves 20-30 hours of management time per quarter — and delivers better intelligence than what they currently produce."]], "milestones": "<strong>Month 1-3:</strong> Fiserv and Jack Henry integrations. Run 2 free deposit attrition analyses. Target first 2 paid clients.<br><br><strong>Month 3-6:</strong> 4-6 clients. Deliver first board-ready quarterly reports. Target $28-42K MRR.<br><br><strong>Month 6-9:</strong> 8-10 clients. Publish benchmark data on community bank deposit retention. Target $60-80K MRR.<br><br><strong>Month 9-12:</strong> 12-15 clients. Second analyst hire. Target $85-110K MRR."}, {"id": "franchise", "rank": 6, "tier": 2, "name": "Franchise systems", "confirmed": false, "hook": "Franchisors sit on unit-level performance data across hundreds of locations and make million-dollar decisions with almost no synthesis. The franchisor pays — not the franchisee.", "scores": {"data": 88, "gap": 92, "pays": 88, "density": 80}, "stats": [["785K+", "US franchise establishments"], ["~3,500", "Active US franchisors"], ["50-500 units", "Your ICP sweet spot"]], "sweet": "Franchisors with 50-500 units in the $5M-$80M royalty revenue range. Large enough to have meaningful cross-unit pattern data. Small enough to lack internal analytics capability.", "why": [["Post-COVID unit performance variance has widened dramatically", "The pandemic and its aftermath produced wildly uneven unit performance. Franchisors who can identify which variables predicted resilience vs. failure can improve new franchisee selection, training, and territory design."], ["Franchisee financial stress is a systemic risk management issue", "Rising labor costs and softening consumer spending are squeezing franchisee P&Ls. Franchisors that can identify which units are heading toward financial distress 90 days early can intervene before a closure — which typically costs $200K-$500K in lost royalties."], ["FDD disclosure requirements are increasing intelligence standards", "Regulatory pressure on Franchise Disclosure Documents is pushing franchisors to have better data on unit economics, failure rates, and franchisee financial performance. Franchisors with strong synthesis capability attract better candidates."]], "data": [{"n": "Unit sales & royalty data", "lvl": "weak", "dot": "#28c48a", "body": "Every franchisee weekly or monthly gross sales report, every royalty payment, every marketing fund contribution. Collected for compliance and revenue recognition. Almost never synthesized across the portfolio to identify performance clusters or leading indicators of unit failure.", "gap": "Units in a specific metro market have seen 4 consecutive quarters of comp sales decline. That pattern predicts closure risk with 78% accuracy based on the last 5 unit failures in the system. Nobody connected those dots."}, {"n": "Franchisee P&L data", "lvl": "none", "dot": "#5b8ef8", "body": "For franchisors with FDD Item 19 disclosure, many franchisees share P&L data. Labor cost %, food/product cost %, and EBITDA margin by unit provide an early warning system that almost no franchisor has built.", "gap": "The bottom quartile of franchisees by EBITDA margin are clustered in a specific cohort — those who opened in 2019 with a specific real estate profile. That cohort needs intervention, not churn."}, {"n": "Training & compliance records", "lvl": "weak", "dot": "#f0a832", "body": "Training completion records, audit scores, health inspection results, and compliance certification status are all captured. Tracked for compliance. Nobody synthesizes whether training completion patterns predict unit performance.", "gap": "Units that completed advanced operations certification within 6 months of opening have 23% lower closure rates over 3 years. That ROI on training has never been quantified."}, {"n": "Support interaction history", "lvl": "none", "dot": "#9d8ff5", "body": "Every support ticket, every field visit report, every phone call with franchise support. Never synthesized to understand which support interventions actually improve unit performance.", "gap": "Field visits to underperforming units cost $3,200 each. The 40% of visits that include a specific operations coaching protocol produce measurable improvement. The other 60% produce no measurable change."}, {"n": "Territory & market data", "lvl": "none", "dot": "#f07060", "body": "Territory boundaries, demographic data, trade area population, competitive unit density. Nobody synthesizes territory performance against original projections.", "gap": "Our territories in mid-tier metros systematically outperform our original models by 18%. Our territories in top-25 metros underperform by 22%. We still use the same territory model for all new development."}, {"n": "Franchisee financial health", "lvl": "none", "dot": "#40c070", "body": "For franchisors with required financial reporting, franchisee balance sheets and working capital trends provide early warning of distress. Even without formal reporting, royalty payment timing is a leading indicator.", "gap": "Seven franchisees have paid royalties late more than 3 times in the last 12 months. Each of the last 4 unit closures was preceded by at least 6 late royalty payments. Nobody is watching this pattern."}], "synth": [["1", "Unit failure prediction model", "Synthesizes comp sales trends, royalty payment timing, P&L data, training compliance, and support interaction history into a unit-level risk score. Flags units at elevated closure risk 90-120 days before the pattern becomes irreversible."], ["2", "Franchisee success profiling", "Analyzes the characteristics of the top-performing quartile of franchisees and surfaces which factors most strongly predict long-term success. Enables data-driven franchisee selection and onboarding improvements."], ["3", "Territory performance intelligence", "Compares actual unit performance against original territory projections by market type, demographic profile, and competitive density. Enables evidence-based improvements to territory sizing for future development."], ["4", "Support ROI analysis", "Synthesizes support interaction data with subsequent unit performance metrics to identify which support protocols produce measurable improvement vs. which have no statistically significant effect."], ["5", "Marketing fund effectiveness", "Synthesizes marketing spend by channel against unit-level comp sales trends to identify which marketing investments are producing measurable franchisee revenue impact."], ["6", "Portfolio health narrative", "Monthly synthesis of the entire franchise portfolio into a board-ready narrative: how many units are growing, stable, declining, or at risk; where the portfolio is geographically concentrating risk."]], "model": [["Entry price", "$4,000/mo for franchisors with 50-150 units. At a franchisor with $8M in royalty revenue, this is 6% of royalties — and the first report typically identifies 3-5 units at closure risk."], ["Scale pricing", "$30-$50 per unit per month. A 200-unit franchisor pays $6,000-$10,000/mo. A 400-unit franchisor pays $12,000-$20,000/mo."], ["Delivery", "Monthly portfolio intelligence brief + quarterly board narrative. Monthly covers the unit risk watchlist, comp sales trend analysis, and flagged interventions. Quarterly provides the full portfolio health review."], ["Onboarding", "Franchise management system + POS data connection. FranConnect, Naranga, and most franchise management platforms have data export capability. 3-5 week setup."], ["Human layer", "One senior analyst per 6-8 franchisor clients. Franchise operations background required — former franchise consultant, director of franchise operations, or multi-unit franchisee."], ["Unit economics", "10 clients x $8,000/mo = $80K MRR / $960K ARR. Franchisor clients are highly sticky — switching requires re-establishing data connections and rebuilding context. Gross margin: 67-72%."]], "risks": ["Data sharing sensitivity with franchisees. Some franchisees resist the franchisor having deep analytics on their operations. Position the service as a support tool for franchisee success — not franchisor surveillance.", "Franchise category matters. Food service franchises have the richest POS data and most acute unit performance pressure. Start with food service — the data is cleaner.", "FDD constraints on data use. Franchisors must be careful about how they use franchisee data. Have franchise legal counsel review your data use positioning before your first client engagement."], "comp": [["FranConnect, Naranga", "CRM + compliance + royalty management", "Manage the franchise relationship operationally. Produce reports. Have no synthesis layer, no narrative, no unit failure prediction.", false], ["Franchise consultants", "Franchisee coaching and operations support", "Provide field support and coaching. Work unit by unit. No portfolio-level synthesis. High cost, low scalability.", false], ["IFA benchmarking reports", "Industry-level performance benchmarks", "Provide industry-level benchmarking. Do not synthesize the franchisor own portfolio data into specific intelligence.", false], ["You", "Portfolio intelligence synthesis -> unit failure prediction", "No dashboards. No logins. A franchise-experienced analyst synthesizes your entire unit portfolio data continuously: which units need intervention, which territories are underperforming, where the portfolio is concentrating risk.", true]], "gtm": [["Target franchisors who recently experienced an unexpected unit closure", "A franchisor that just lost a unit is maximally receptive to a unit failure prediction service. The emotional stakes are high and the ROI argument is immediate."], ["Free unit risk audit as door-opener", "Pull 12 months of royalty payment history and comp sales data. Identify the 3-5 units at highest statistical risk. Most franchisors find at least one surprise."], ["IFA Annual Convention and category associations", "The IFA Annual Convention is the single most concentrated gathering of franchise executives in the world. Category associations provide even more focused access."], ["Franchise attorney and consultant referral network", "Franchise development consultants, franchise attorneys, and franchise brokers regularly encounter franchisors with unit performance problems."], ["Price anchored to the cost of a unit closure", "A unit closure costs you $150K-$400K in lost royalties and re-franchising expense. We identify 3-5 at-risk units per year. At $96K/year, the ROI on preventing one closure is 3-10x in the first year alone."]], "milestones": "<strong>Month 1-3:</strong> FranConnect and Naranga integrations. Build unit risk scoring model. Run 2 free unit risk audits. Target first 2 paid franchisor clients.<br><br><strong>Month 3-6:</strong> 4-6 clients. Deliver first monthly portfolio briefs. Build IFA presence. Target $28-48K MRR.<br><br><strong>Month 6-9:</strong> 8-10 clients. Publish State of Franchise Unit Performance benchmark report. Target $60-80K MRR.<br><br><strong>Month 9-12:</strong> 12-15 clients. Second analyst hire. Target $90-120K MRR."}, {"id": "staffing", "rank": 7, "tier": 2, "name": "Staffing & workforce solutions", "confirmed": false, "hook": "Fill rates, margin by client, placement longevity, recruiter productivity, and at-risk client signals sit in ATS and billing systems. Nobody synthesizes it. Mid-market staffing is well-capitalized.", "scores": {"data": 85, "gap": 93, "pays": 82, "density": 86}, "stats": [["$218B", "US staffing industry revenue"], ["~25K", "US staffing firms"], ["$20M-$150M", "Your revenue ICP"]], "sweet": "Staffing and workforce solutions firms doing $20M-$150M in revenue — primarily in light industrial, professional, technical, or healthcare staffing. Large enough to have meaningful ATS data, multiple clients, and multiple recruiters. Small enough to lack internal analytics capability.", "why": [["Margin compression from rising wages and client pricing pressure", "Staffing margins are under pressure from both directions: rising worker wages and client rate compression from procurement-driven buying. Firms that identify which client relationships are structurally margin-negative have a significant operational advantage."], ["Early termination rates have increased dramatically post-COVID", "Worker retention in temporary and contract placements has deteriorated since 2020. Every early termination costs the firm the replacement cost plus margin erosion during the gap."], ["Client concentration risk is elevated", "Many staffing firms have significant revenue concentration in a small number of clients — clients who are now building internal recruiting capability to replace them."]], "data": [{"n": "ATS placement & tenure data", "lvl": "weak", "dot": "#28c48a", "body": "Every placed worker: start date, assignment type, client, position, bill rate, pay rate, placement duration, and termination reason. Bullhorn, JobDiva, Avionte capture this exhaustively. Fill rates tracked weekly. Placement longevity patterns by client, job type, and worker profile almost never synthesized.", "gap": "Our industrial placements at Client X have an average tenure of 34 days vs. 68 days for comparable placements at Client Y. The 34-day tenure destroys our margin on that account. We knew the fill rate. Nobody knew tenure was the real problem."}, {"n": "Bill rate & pay rate margin data", "lvl": "weak", "dot": "#5b8ef8", "body": "Every client bill rate, every worker pay rate, every markup percentage. True margin analysis — by client, by job type, by geography, adjusted for turnover cost and recruiting time — almost never done.", "gap": "We think Client Z is our second-most-profitable account. After adjusting for time-to-fill, recruiter hours per placement, early termination replacement cost, and admin burden, it is our sixth-most-profitable."}, {"n": "Recruiter productivity data", "lvl": "none", "dot": "#f0a832", "body": "Submittals per job order, interview-to-offer ratios, offer-to-start ratios, fill time, and requisition aging are all in the ATS. Recruiter productivity tracked at summary level. Patterns predicting which recruiters produce high-tenure vs. high-turnover placements never analyzed.", "gap": "Recruiter A placements have 2.3x the 90-day retention rate of Recruiter B for the same job types at the same clients. The difference is in the screening process — a pattern visible in the ATS data that nobody has ever looked for."}, {"n": "Client order patterns & health signals", "lvl": "none", "dot": "#9d8ff5", "body": "Order frequency, order size, order cancellation rate, job requisition aging, and client contact activity are all in the ATS and CRM. Client health assessed based on current month volume. Nobody synthesizes leading indicators of client relationship decline.", "gap": "Client W has reduced their average order size by 22% over 3 months and is now providing 48-hour job notifications vs. their historical 2-week advance notice. Both indicate a client building internal recruiting capability. They will be gone in 6 months."}, {"n": "Worker quality & compliance data", "lvl": "weak", "dot": "#f07060", "body": "Background check results, skills assessment scores, drug screening, I-9 compliance, onboarding completion, and training certifications are all captured. Nobody synthesizes whether certain worker qualification profiles correlate with higher tenure.", "gap": "Workers with a specific combination of background check profile and prior assignment tenure have 3.1x the 90-day retention rate. Applied to our screening process, this would reduce industrial early termination rate by an estimated 18%."}, {"n": "Early termination & replacement patterns", "lvl": "weak", "dot": "#40c070", "body": "Every early termination: reason code, days worked, client, position type, recruiter who placed. Nobody synthesizes which clients, job types, or placement profiles generate disproportionate early termination rates.", "gap": "Early terminations in our light industrial division cost us $1.4M annually. 60% of those terminations come from 20% of our clients. We have never identified which 20%."}], "synth": [["1", "Client health radar", "Synthesizes order frequency trends, order size patterns, job requisition aging, and client contact activity into a monthly client health score. Identifies which client relationships are growing, stable, or showing early attrition signals."], ["2", "True margin intelligence", "Calculates true margin by client after adjusting for recruiter time-to-fill, early termination replacement cost, compliance admin burden, and payment terms cost. Surfaces which clients look profitable on the rate sheet but are margin-negative in practice."], ["3", "Recruiter performance patterns", "Identifies which recruiters produce the highest 90-day placement retention rates and lowest early termination frequency — and correlates those outcomes with their specific screening and communication practices."], ["4", "Early termination analysis", "Identifies the specific client, job type, and worker profile combinations driving disproportionate early termination. Quantifies the full cost of ear
