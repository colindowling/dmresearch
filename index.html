e, and the National Restaurant Association multi-unit sessions are your channel events."], ["R365 user community and conference", "R365 hosts an annual user conference and maintains an active customer community. Participate in the community, provide genuine value through content and Q&A, and build relationships with power users who become advocates."], ["PE-backed restaurant platform partnerships", "PE-backed restaurant groups often using R365 as the platform standard across acquisitions need portfolio-level intelligence. A single platform client covering 8-15 restaurant brands is worth $50K-$120K in ARR."]], "milestones": "<strong>Month 1-3:</strong> R365 API integration. Join R365 partner program. Run 3 free food cost audits. Target first 3 paid clients.<br><br><strong>Month 3-6:</strong> 8-10 clients. First bi-weekly food cost flash deliveries. Attend RFDC. Target $35-55K MRR.<br><br><strong>Month 6-9:</strong> 12-15 clients. R365 partner marketplace listing. Publish benchmark report on multi-unit food cost variance. Target $65-90K MRR.<br><br><strong>Month 9-12:</strong> 18-22 clients. Second analyst hire. First PE platform enterprise inquiry. Target $100-130K MRR."}, {"id": "shopify_plus", "rank": 5, "tier": 2, "name": "Shopify Plus", "industryTag": "Mid-market e-commerce — $5M-$100M GMV", "encroach": "med", "hook": "Extraordinary customer and product data. Plus merchants spend heavily on tools. The synthesis gap is wide — but Shopify is building analytics features fast. Your human analyst is your moat.", "scores": {"data": 92, "gap": 82, "pays": 90, "community": 88, "api": 97}, "stats": [["20,000+", "Shopify Plus merchants globally"], ["$5M-$100M", "Your ICP GMV range"], ["$2,300/mo", "Shopify Plus minimum platform fee"]], "sweet": "Shopify Plus merchants doing $5M-$100M in GMV with 5+ years on the platform and a meaningful catalog (100+ SKUs) and customer database (10K+ customers). These merchants are sophisticated enough to have tried multiple analytics tools — and sophisticated enough to know that dashboards are not synthesis.", "why": [["Customer acquisition costs have risen dramatically", "Meta and Google advertising costs have roughly tripled since 2019 for most Shopify merchants. Merchants that can identify which customer cohorts have the highest LTV — and concentrate acquisition spend on attracting more of them — have a significant cost-of-acquisition advantage."], ["Return rates are rising and destroying margin", "Return rates on e-commerce have increased significantly post-COVID as customers developed ordering-to-try behavior. Merchants that can identify which products, which customer segments, and which acquisition channels produce the highest return rates can take targeted action to protect gross margin."], ["Shopify's analytics ecosystem is crowded but the synthesis gap remains", "Triple Whale, Northbeam, and Glew have all entered the Shopify analytics space. They produce dashboards. None of them have a human analyst who reads the data and tells the merchant what it means and what to do. That gap is fully open."]], "captures": [{"n": "Order & transaction data", "body": "Every order: customer, products, variants, quantity, price, discounts applied, channel source, payment method, fulfillment status, and refund history. The complete commercial transaction record with extraordinary granularity.", "chips": ["Order history & status", "Product & variant detail", "Discount application", "Channel attribution", "Refund & return data", "Fulfillment performance"]}, {"n": "Customer behavior data", "body": "Every customer's full purchase history, email engagement, visit frequency, geographic data, and lifetime value. Shopify's customer object is one of the richest in any platform — capturing behavioral signals that most merchants only access through their ESP or analytics tool.", "chips": ["Customer purchase history", "LTV by cohort", "Visit & browse patterns", "Email engagement correlation", "Geographic distribution", "RFM segmentation"]}, {"n": "Product performance data", "body": "Every product's view count, add-to-cart rate, conversion rate, return rate, and margin contribution. Shopify captures the full funnel from browse to purchase to return for every product — data that almost no merchant synthesizes across their full catalog.", "chips": ["Conversion by product", "Return rate by SKU", "Margin by product", "View-to-cart rates", "Bundle performance", "Collection performance"]}, {"n": "Marketing attribution data", "body": "UTM parameters, referral source, landing page, and channel for every session and order. When correlated with LTV data, this reveals which channels produce high-LTV customers vs. which produce low-LTV, high-return customers — a distinction most attribution tools do not make.", "chips": ["Channel attribution", "UTM tracking", "Landing page performance", "Ad spend correlation", "LTV by channel", "CAC by customer type"]}], "synth": [["1", "Customer cohort intelligence", "Analyzes customer acquisition cohorts by channel, by acquisition period, and by first-purchase category to identify which cohorts have the highest 12-month LTV. Surfaces the specific acquisition characteristics and first-purchase behaviors that predict long-term customer value."], ["2", "Product margin analysis", "Calculates true margin contribution by product after factoring in return rate, discount frequency, and fulfillment cost. Identifies which products look profitable on revenue but are margin-negative after returns are netted out."], ["3", "Marketing ROI by customer quality", "Calculates blended CAC and 12-month LTV by marketing channel. Identifies which channels produce high-LTV, low-return, high-reorder customers vs. which produce one-time, discount-driven, high-return customers."], ["4", "Return pattern analysis", "Identifies the specific product attributes, customer segments, and acquisition channels that produce the highest return rates. Quantifies the margin impact of return concentration and surfaces targeted actions to reduce returns."], ["5", "Inventory & demand intelligence", "Synthesizes order velocity, seasonal patterns, and SKU-level demand signals to identify inventory concentration risk and stockout probability by product. Enables proactive inventory positioning before stockout events destroy conversion rates during peak demand periods."], ["6", "E-commerce performance narrative", "Monthly synthesis of store performance into an executive and investor-ready narrative: revenue trends, customer cohort health, margin by category, and marketing efficiency."]], "model": [["Entry price", "$4,500/mo for merchants doing $5M-$20M in GMV. At a $10M merchant with 50% gross margins, this is 0.9% of gross margin — less than the monthly cost of one underperforming ad channel."], ["Scale pricing", "$6,000-$10,000/mo for merchants doing $20M-$100M in GMV. Scales with catalog size, customer database depth, and channel complexity."], ["Delivery", "Monthly intelligence brief + weekly performance flash. The weekly flash covers the top 3 things the merchant should know about the previous week's performance — one finding per week is enough to be actionable without overwhelming."], ["Onboarding", "Shopify API + ad platform connections. Shopify has one of the most accessible APIs in any platform. Setup: 1-2 weeks. Meta and Google Ads connections add 1 week. First insights at day 21."], ["Human layer", "One senior analyst per 10-12 Shopify Plus clients. E-commerce operations, performance marketing, or DTC brand background required. Former CMO, Head of Growth, or e-commerce consultant makes the ideal profile."], ["Unit economics", "15 clients x $6,000/mo = $90K MRR / $1.08M ARR. Shopify Plus merchants have high churn risk if they do not see immediate, specific value — deliver the first insight within 14 days of onboarding. Gross margin: 67-71%."]], "risks": ["The analytics ecosystem is crowded. Triple Whale, Northbeam, and Glew are all well-funded. Your positioning must be explicitly and consistently differentiated: you are not a dashboard — you are a human analyst who reads the data and tells the merchant what it means and what to do. Never let that distinction blur.", "Shopify is building analytics features aggressively. Shopify Analytics has been improving steadily. Watch what they build. Your moat is always the human interpretation layer — that is the thing software cannot replace.", "Merchant stage matters. A $5M merchant who just moved to Shopify Plus is very different from a $50M merchant who has been on Plus for 5 years. The data depth and synthesis complexity scale with tenure and size. Set expectations accordingly during discovery."], "ecosystem": [["Triple Whale, Northbeam", "Attribution and analytics dashboards", "Sophisticated dashboard tools focused primarily on marketing attribution. Produce dashboards. No human analyst narrative. No product margin synthesis. No customer cohort intelligence delivered as a brief."], ["Glew.io", "E-commerce analytics platform", "Multi-channel analytics dashboard focused on revenue and customer reporting. Produces reports. No forward-looking synthesis. No narrative. The human interpretation layer is entirely absent."], ["Shopify Analytics (native)", "Built-in reporting and analytics", "Rapidly improving native analytics. Covers standard reports well. No human synthesis. No cross-channel LTV analysis. No return pattern intelligence."]], "gtm": [["Shopify partner program listing as your foundation", "Shopify's Partner Program and App Marketplace listing (as an analytics/intelligence service partner) puts you in front of merchants actively looking for analytics capabilities."], ["DTC and e-commerce operator communities", "DTC communities (DTC Newsletter, Operators, BDOW!) are where Shopify Plus merchants spend time. Providing genuine value — sharing real findings anonymized from client work — builds credibility and generates inbound organically."], ["Shopify agency partnerships", "Shopify development and marketing agencies serve Shopify Plus merchants daily. A referral partnership with 5-10 agencies generates warm introductions continuously."], ["Free customer cohort audit as door-opener", "Pull 12 months of Shopify data and deliver a 5-page cohort analysis: which acquisition channels have the highest 12-month LTV, which product categories have the worst return rates, and what the estimated annual margin impact of both is. Most merchants find at least one significant surprise."], ["PE-backed DTC brands as enterprise channel", "PE firms and family offices that have invested in DTC brands need portfolio-level e-commerce intelligence across all their portfolio companies. A single enterprise relationship covering 3-8 brands is worth $50K-$120K in ARR."]], "milestones": "<strong>Month 1-3:</strong> Shopify API integration + Meta and Google Ads connections. Run 3 free cohort audits. Target first 3 paid clients.<br><br><strong>Month 3-6:</strong> 8-10 clients. Apply for Shopify partner program listing. Deliver first monthly briefs and weekly flashes. Target $40-60K MRR.<br><br><strong>Month 6-9:</strong> 12-15 clients. Publish DTC benchmark report using anonymized client data. Target $70-90K MRR.<br><br><strong>Month 9-12:</strong> 18-22 clients. Second analyst hire. Begin pursuing first PE platform enterprise relationship. Target $100-130K MRR."}, {"id": "sap_b1", "rank": 6, "tier": 2, "name": "SAP Business One / S/4HANA", "industryTag": "Mid-market manufacturing & distribution", "encroach": "low", "hook": "SAP is the motherlode of operational data. The synthesis gap for mid-market SAP users is enormous — they have SAP Analytics Cloud available and almost never use it. Payoff is massive; execution requires SAP expertise.", "scores": {"data": 98, "gap": 90, "pays": 93, "community": 88, "api": 68}, "stats": [["30,000+", "SAP B1 customers worldwide"], ["$10M-$80M", "Business One revenue sweet spot"], ["#1", "ERP market share globally"]], "sweet": "Mid-market manufacturers and distributors doing $10M-$80M in revenue on SAP Business One. Large enough to have years of rich operational, financial, and supply chain data. Small enough to lack an internal analytics team. The CFO is producing monthly financial closes. The COO is managing by exception reports. Nobody is synthesizing across the system.", "why": [["SAP users have years of clean, rich data but no synthesis layer", "SAP Business One users tend to be more operationally sophisticated than users of lighter ERPs. They have cleaner data, more consistent processes, and more complete historical records. The synthesis gap — not the data gap — is what defines the opportunity here."], ["SAP Analytics Cloud is available but requires expertise nobody has", "SAP bundles SAP Analytics Cloud (SAC) with many Business One licenses. SAC is a powerful analytics platform. Mid-market companies almost never deploy it because it requires a dedicated analytics professional to configure and maintain — a resource they do not have."], ["Supply chain intelligence is uniquely critical for SAP manufacturers and distributors", "SAP Business One users are disproportionately manufacturers and distributors — the two industry types where supply chain and operational intelligence have the highest ROI. The platform captures exactly the right data for the intelligence products that matter most to these operators."]], "captures": [{"n": "Full operational & financial data", "body": "Every production order, every goods movement, every purchase order, every goods receipt, every quality inspection result, every journal entry, every AR/AP transaction, every cost center allocation, and every profit center. SAP Business One captures the most complete operational picture of any mid-market ERP.", "chips": ["Production & OEE data", "Quality & defect logs", "Goods movements", "Full financials", "Cost center data", "Profit center reporting"]}, {"n": "Supply chain & vendor data", "body": "Every purchase order, every goods receipt, every vendor invoice, every delivery performance record, every vendor evaluation, and every goods return. SAP's vendor evaluation module captures a rich picture of supplier performance that almost no company synthesizes.", "chips": ["Vendor evaluations", "Delivery performance", "Purchase order history", "Goods receipt data", "Invoice & payment data", "Quality inspection by vendor"]}, {"n": "Customer & sales data", "body": "Every sales order, every delivery, every invoice, every credit memo, every customer payment, every customer complaint, and every service call. SAP's customer master captures the full commercial relationship in one system.", "chips": ["Sales order history", "Customer pricing", "Delivery performance", "Invoice & collection data", "Customer complaints", "Service call history"]}, {"n": "Inventory & warehouse data", "body": "Every goods movement, every inventory count, every batch record, every serial number, every transfer order, and every goods issue. SAP's warehouse management module provides the most granular inventory picture of any mid-market ERP.", "chips": ["Inventory movements", "Batch & serial tracking", "Inventory counts", "Transfer orders", "Goods issues", "Stock aging"]}], "synth": [["1", "Product & customer profitability intelligence", "Full cost allocation across production orders, materials, overhead, and customer-specific handling costs. Surfaces which products and which customers are truly profitable after all costs are allocated — a picture most SAP users have never seen because standard cost systems obscure it."], ["2", "Supplier performance synthesis", "Synthesizes SAP's vendor evaluation data, delivery performance records, quality inspection results, and invoice history into a monthly supplier scorecard. Identifies which supplier relationships are degrading and quantifies the cost of each underperforming relationship."], ["3", "Production & OEE intelligence", "Identifies which production orders, which work centers, and which material batches consistently produce the highest scrap rates, the longest cycle times, or the most quality nonconformances. Correlates those patterns with supplier source, operator assignment, and maintenance history."], ["4", "Working capital analysis", "Synthesizes SAP's complete AR, AP, and inventory data into a working capital intelligence brief. Identifies where cash is trapped — in slow-paying customers, over-ordered inventory, or premature supplier payments — and quantifies the release opportunity."], ["5", "Supply chain risk radar", "Synthesizes delivery performance trends, quality defect concentration, pricing history, and geographic concentration across all active suppliers to identify supply chain risks 90 days before they become disruptions."], ["6", "Executive & board intelligence narrative", "Monthly synthesis of business performance across all SAP Business One modules into a CEO and board-ready narrative. Replaces the manual data assembly that most CFOs perform before board meetings with a delivered, forward-looking intelligence brief."]], "model": [["Entry price", "$5,500/mo for manufacturers and distributors doing $10M-$40M in revenue. At a $25M manufacturer, this is 0.26% of revenue. The first synthesis report typically identifies $200K-$600K in recoverable margin, working capital, or supply chain cost."], ["Scale pricing", "$8,000-$15,000/mo for companies doing $40M-$150M in revenue. Scales with operational complexity and module adoption."], ["Delivery", "Monthly intelligence brief + quarterly strategic deep dive. Monthly covers supply chain risk, operational leading indicators, and financial performance trends. Quarterly covers product and customer profitability, working capital optimization, and strategic opportunities."], ["Onboarding", "SAP Business One API via Service Layer. SAP Business One has a well-documented REST API (Service Layer) that provides access to all modules. Integration setup: 4-6 weeks due to the complexity and richness of the data model. First insights at day 45."], ["Human layer", "One senior analyst per 6-8 SAP Business One clients. SAP Business One implementation or consulting background required. A former SAP partner consultant or SAP Business One administrator who has worked across multiple implementations is the ideal profile."], ["Unit economics", "10 clients x $8,000/mo = $80K MRR / $960K ARR. SAP clients are extremely sticky — the integration is complex and the context accumulated over time is irreplaceable. Once in, you stay. Gross margin: 67-72%."]], "risks": ["SAP expertise is a real requirement. The SAP Business One data model is complex — particularly for manufacturing companies with production orders, batch management, and quality modules. Hire your SAP-experienced analyst before you sell your first SAP client, not after.", "Start with SAP Business One, not SAP S/4HANA. S/4HANA enterprise clients often already have SAP Analytics Cloud deployed with internal analytics teams. Business One users in the $10M-$80M revenue range are your sweet spot — complex enough to need synthesis, small enough to not have it yet.", "SAP Business One has regional variation in adoption. The platform is especially strong in manufacturing and distribution companies in the US, EU, and Israel. Your ICP is most concentrated in these regions and industries."], "ecosystem": [["SAP Analytics Cloud (native)", "SAP's enterprise analytics and planning platform", "Available to many SAP B1 customers under existing licenses. Powerful if you have a dedicated analytics professional to configure and maintain. Almost never deployed by mid-market companies because they lack the internal expertise."], ["Crystal Reports for SAP B1 (native)", "Built-in reporting tool", "Produces static, templated reports. Requires significant setup time per report. Not a synthesis tool — a report generation tool. Most companies use it for invoices, purchase orders, and standard financial reports."], ["SAP Business One Partners (VARs)", "SAP B1 implementation and support partners", "Implement and support the ERP. Rarely offer continuous data synthesis. Your partnership opportunity — a referral relationship with SAP VARs generates warm introductions to exactly your ICP."]], "gtm": [["ASUG (Americas' SAP Users' Group) is your primary conference channel", "ASUG is one of the largest enterprise software user communities in the world. SAPPHIRE is the annual conference. SAPinsider is the media outlet. These channels are far less crowded with intelligence vendors than Salesforce's or Shopify's ecosystems."], ["SAP Business One Value-Added Reseller (VAR) network", "There are several hundred SAP B1 VARs in the US. The top 50 each manage 50-200 active SAP B1 implementations. A referral relationship with 5-10 VARs who position you as their intelligence partner generates warm introductions continuously."], ["SAP Business One manufacturing user groups", "SAP Business One has active industry user groups — especially for manufacturing. Participating in and presenting at these groups positions you as the intelligence expert within the community that knows the platform best."], ["Free supply chain risk analysis as door-opener", "Pull 12 months of SAP vendor evaluation and delivery performance data and deliver a 6-page supplier risk analysis: which suppliers are showing degradation signals, what the quantified cost of those relationships is, and what intervention would recover. Most manufacturers find at least one significant surprise."], ["Frame pricing against supply chain disruption cost", "For a $30M manufacturer, a single supply chain disruption — missing production for 2 weeks — costs $500K-$1.5M in lost revenue and expediting cost. Our service identifies the supplier relationships most likely to cause that disruption 90 days before it happens. At $66K/year, the ROI on preventing one disruption is 7-20x."]], "milestones": "<strong>Month 1-3:</strong> SAP B1 Service Layer integration. Hire SAP-experienced analyst. Run 2 free supplier risk analyses. Target first 2 paid clients.<br><br><strong>Month 3-6:</strong> 5 clients. Begin building SAP VAR referral relationships. Attend regional ASUG event. Target $35-50K MRR.<br><br><strong>Month 6-9:</strong> 8-10 clients. Speak at SAP B1 manufacturing user group. Publish benchmark report for one manufacturing sub-vertical. Target $65-90K MRR.<br><br><strong>Month 9-12:</strong> 12-15 clients. Second analyst hire. Begin SAPPHIRE conference relationship. Target $95-130K MRR."}, {"id": "procore", "rank": 7, "tier": 2, "name": "Procore", "industryTag": "Construction — GCs & specialty contractors", "encroach": "low", "hook": "Captures RFIs, submittals, change orders, daily logs, budget variances, and safety incidents across every project. The data is extraordinary. Procore users self-select as the most analytics-forward construction companies.", "scores": {"data": 90, "gap": 93, "pays": 75, "community": 87, "api": 92}, "stats": [["16,000+", "Procore customers globally"], ["$20M-$150M", "Your ICP contractor revenue"], ["Groundbreak", "Procore's annual conference (your channel)"]], "sweet": "General contractors and specialty contractors doing $20M-$150M in annual volume who have been running Procore for at least 2 years. These are the most technology-forward construction companies in the market — they adopted Procore because they believe in data. They just have no synthesis layer on top of it.", "why": [["Procore users have self-selected as analytics-forward construction companies", "A GC that adopted Procore has already signaled they believe in data. They are not like the general construction market. Your ICP filter is Procore users specifically — not construction companies broadly. That reframes the sell entirely."], ["Change order and budget variance data is extremely valuable but completely unread at the portfolio level", "Procore captures change order history, RFI patterns, submittal rejections, and budget variances across every active project. A GC running 8 active projects has more operational data than they have ever had — and almost no synthesis of what it is saying across projects."], ["Safety and compliance data creates an intelligence opportunity construction has never had before", "Procore's safety observation logs, incident reports, and inspection results capture safety performance data that most GCs have never been able to analyze systematically. Intelligence that identifies safety risk concentration — by project type, by subcontractor, by crew — before an incident occurs is a genuinely new category."]], "captures": [{"n": "Change order & budget variance data", "body": "Every change order: the reason code, the dollar amount, the responsible party, the schedule impact, and the approval status. Every budget variance: the cost code, the amount, the cause, and the timing. Procore captures the financial intelligence of every project in extraordinary detail.", "chips": ["Change order history", "Change order reason codes", "Budget vs. actual by cost code", "Schedule impact data", "Responsible party tracking", "Variance trending"]}, {"n": "RFI & submittal logs", "body": "Every RFI submitted: the topic, the responsible party, the time to response, the ball-in-court status, and the resolution. Every submittal: the type, the review cycle time, the number of rejection cycles, and the spec section. These logs reveal which design and coordination problems are systemic across projects.", "chips": ["RFI volume & timing", "RFI responsible parties", "Submittal review cycles", "Rejection frequency", "Spec section patterns", "Coordination issues"]}, {"n": "Daily reports & field data", "body": "Every daily report filed by a superintendent: weather, crew count, work accomplished, equipment on site, and issues encountered. Every observation logged by field staff. Every photo tied to a location and a date. This is the most complete field intelligence capture in construction history.", "chips": ["Daily report data", "Crew productivity", "Equipment utilization", "Field observations", "Photo & documentation", "Weather & delay tracking"]}, {"n": "Subcontractor performance data", "body": "Every subcontractor's schedule compliance, quality defect frequency, safety observation record, and RFI response time across the GC's project portfolio. No GC has ever been able to systematically evaluate subcontractor performance across all active projects simultaneously. Procore makes this possible.", "chips": ["Schedule compliance", "Quality defect frequency", "Safety observations", "RFI response time", "Payment application timing", "Submittal performance"]}], "synth": [["1", "Change order pattern intelligence", "Identifies which project types, which design teams, which owners, and which contract structures generate the highest change order frequency and dollar value. Synthesizes change order reason codes to identify which problems are systemic across the GC's project portfolio and which represent isolated one-time events."], ["2", "Budget variance early warning", "Synthesizes budget variance trends by cost code, by subcontractor, and by project phase to identify projects trending toward cost overruns 60-90 days before they breach the project budget. Delivers a monthly watchlist of projects at elevated financial risk."], ["3", "Subcontractor performance scorecard", "Synthesizes schedule compliance, quality defect frequency, RFI response time, and safety observation data for every active subcontractor across the GC's entire project portfolio into a monthly performance scorecard. Enables data-driven subcontractor selection and early intervention with underperforming subs."], ["4", "Safety risk intelligence", "Synthesizes Procore's safety observation logs, incident reports, and inspection results to identify which project types, which crew compositions, which subcontractors, and which phases of work generate the highest safety risk concentration. Enables targeted safety intervention before an incident occurs."], ["5", "Project type profitability analysis", "Synthesizes Procore's financial data with historical project type and owner type classifications to identify which categories of work are truly profitable for the GC — and which appear profitable in the estimate but consistently underperform in execution."], ["6", "Portfolio health narrative", "Monthly synthesis of the GC's active project portfolio into an owner and executive team narrative: which projects are on budget and on schedule, which are at elevated risk, which subcontractor relationships are underperforming, and what the financial trajectory of the portfolio looks like for the next quarter."]], "model": [["Entry price", "$5,000/mo for GCs and specialty contractors doing $20M-$60M in annual volume. At a $40M GC, this is 0.15% of revenue. The first synthesis report typically identifies $200K-$500K in recoverable margin through change order pattern correction or subcontractor performance improvement."], ["Scale pricing", "$7,000-$12,000/mo for contractors doing $60M-$150M. At this size, portfolio complexity and the ROI of intelligence both scale significantly."], ["Delivery", "Monthly intelligence brief + quarterly strategic review. Monthly covers the project risk watchlist, change order trends, subcontractor performance flags, and budget variance early warnings. Quarterly provides the portfolio-level strategic review for company leadership."], ["Onboarding", "Procore API connection. Procore has a well-documented, highly accessible REST API. Setup: 1-2 weeks. One of the smoothest integrations on this list. First insights at day 21."], ["Human layer", "One senior analyst per 6-8 contractor clients. Construction operations background required — former project manager, superintendent, or construction operations consultant. Understanding what an RFI response time pattern means in context of a design team is essential."], ["Unit economics", "10 clients x $7,000/mo = $70K MRR / $840K ARR. Procore clients who adopt your service tend to stay — the intelligence becomes operationally critical. Gross margin: 65-70%."]], "risks": ["Even among Procore users, construction sales cycles are longer than other verticals. Plan for 60-90 day sales cycles and lean hard on the free audit as your wedge. The founder or CFO of a $40M GC will want a long evaluation before signing a $7K/mo contract.", "The construction market is geographically concentrated. Your addressable market within Procore is denser in certain regions (the Southeast, Texas, California, and the Northeast) than others. Consider geographic focus in your initial go-to-market rather than trying to cover the whole country simultaneously.", "Project data quality varies by superintendent discipline. Some superintendents file detailed daily reports; others file minimal notes. Your synthesis quality depends on data quality. Include a data quality assessment in your onboarding — and design your intelligence products to work well even with imperfect field data."], "ecosystem": [["Procore Analytics (native)", "Built-in project analytics and reporting", "Produces project-level and portfolio-level reports. Requires user configuration. No synthesis. No narrative. No forward-looking signals. Their dashboards are the input to your synthesis — not a substitute for it."], ["Procore App Marketplace partners", "Third-party apps integrated with Procore", "Hundreds of apps integrated with Procore — scheduling tools, estimating platforms, accounting connectors. None of them synthesize Procore's full data set into project intelligence narrative. The synthesis gap is fully open."], ["Construction consultants", "Operational improvement and business consulting", "Periodic engagements at $20K-$75K. Walk in, observe, make recommendations, walk out. No continuous data synthesis from Procore."]], "gtm": [["Groundbreak (Procore's annual conference) is your anchor event", "Groundbreak is Procore's annual user conference — the single most concentrated gathering of Procore users in the world. A sponsored session, booth, or speaking slot at Groundbreak puts you in front of thousands of your exact prospect profile in 3 days."], ["Procore App Marketplace partner listing", "Procore's App Marketplace lists certified integration and service partners directly in the platform. A partner listing generates inbound from contractors actively looking for analytics and intelligence capabilities."], ["AGC (Associated General Contractors) and specialty contractor associations", "AGC chapters, NECA (electrical), MCAA (mechanical), and ASA (specialty) are your channels. These associations run regional and national conferences where Procore-using contractors gather. One speaking slot on what your Procore data is actually telling you is worth 500 cold emails."], ["Free change order pattern audit as door-opener", "Pull 12 months of Procore change order data and deliver a 5-page analysis: which project types generate the highest change order frequency, which owner types generate the most destructive scope disputes, and the estimated annual margin impact. Most GCs find at least one significant pattern they had not previously identified."], ["Frame ROI around change order recovery and subcontractor selection", "For a $50M GC, reducing change order frequency by 15% across the project portfolio recovers $300K-$600K in margin annually. Our service identifies which contract structures and design teams produce the most destructive change order patterns. At $60K/year, that ROI closes the conversation."]], "milestones": "<strong>Month 1-3:</strong> Procore API integration. Hire construction-experienced analyst. Run 2 free change order audits. Target first 2 paid clients.<br><br><strong>Month 3-6:</strong> 5 clients. Apply for Procore App Marketplace listing. Build AGC chapter relationship. Target $28-42K MRR.<br><br><strong>Month 6-9:</strong> 8-10 clients. Attend Groundbreak or regional Procore event. Publish construction benchmark report. Target $55-75K MRR.<br><br><strong>Month 9-12:</strong> 12-15 clients. Second analyst hire. Apply for Groundbreak speaking slot. Target $85-110K MRR."}, {"id": "quickbooks", "rank": 8, "tier": 3, "name": "QuickBooks Enterprise", "industryTag": "SMB / lower mid-market — sell via ProAdvisors", "encroach": "low", "hook": "QBO/QBE has a synthesis gap so wide you can drive a truck through it. The challenge: most users are too small. The solution: do not sell to QBO users — sell to their accountants, who bundle your service into their advisory offering.", "scores": {"data": 78, "gap": 95, "pays": 60, "community": 92, "api": 95}, "stats": [["700,000+", "QuickBooks ProAdvisors in the US"], ["$2M-$15M", "QBO user revenue ICP (through accountants)"], ["#1", "SMB accounting software market share"]], "sweet": "CPA firms and bookkeeping practices with 20+ QuickBooks clients who want to offer advisory services but lack the AI and analytics infrastructure to do it profitably. You are not selling to the QBO user — you are selling to the accountant who serves the QBO user.", "why": [["Intuit has been pushing accountants toward advisory for years — you are the engine that makes it possible", "Intuit's messaging to ProAdvisors has been consistently pushing them toward higher-value advisory services and away from compliance-only work. Most ProAdvisors want to offer advisory. Most of them lack the analytics infrastructure to do it at scale. You are the solution to the problem Intuit created."], ["The QBO/QBE synthesis gap is genuinely enormous", "QuickBooks Online and Enterprise capture the full P&L, balance sheet, cash flow, AR/AP aging, job costing (Enterprise), vendor spend history, and payroll data for every client. Almost none of it is synthesized into forward-looking intelligence by the accountant or the client. The gap is real and wide."], ["The ProAdvisor channel concentrates your buyer in one accessible community", "There are 700,000+ QuickBooks ProAdvisors in the US. The top 10% — CPA firms and bookkeeping practices that want to offer advisory services but do not have the AI or analytics infrastructure — are your actual buyers. They are accessible through one community: Intuit's ProAdvisor network."]], "captures": [{"n": "Full financial data", "body": "P&L, balance sheet, cash flow, and trial balance for every client company. QuickBooks captures the complete financial history of every company using the platform — often going back 5-10 years.", "chips": ["P&L trends", "Balance sheet data", "Cash flow history", "Trial balance", "Revenue by customer", "Expense by category"]}, {"n": "AR/AP and cash flow data", "body": "Every invoice, every payment, every bill, every vendor payment, every outstanding balance. QuickBooks AR and AP data captures the full picture of working capital dynamics for every client company.", "chips": ["AR aging by customer", "AP aging by vendor", "Collection performance", "Payment timing", "Outstanding balances", "Working capital trends"]}, {"n": "Job costing data (Enterprise)", "body": "For QuickBooks Enterprise users with job costing enabled: every job, every cost allocated by job, every revenue recognized by job, every labor hour by job. Job costing data in QuickBooks Enterprise is the most underutilized intelligence asset in the SMB market.", "chips": ["Job profitability", "Labor by job", "Materials by job", "Overhead allocation", "Job margin trends", "Estimate vs. actual"]}, {"n": "Vendor & payroll data", "body": "Every vendor relationship, every payroll run, every payroll tax payment, every employee record. For accountants managing multiple clients, synthesizing vendor spend patterns and payroll cost trends across a client portfolio reveals strategic intelligence that individual client-level views cannot.", "chips": ["Vendor spend history", "Payroll cost trends", "Employee count history", "Payroll tax data", "Benefit cost trends", "Vendor concentration"]}], "synth": [["1", "Client financial health monitoring", "For the accounting firm: synthesizes key financial ratios, cash flow trends, AR aging, and expense anomalies for each client company to produce a monthly client health dashboard. Identifies which clients need proactive advisory conversations and which are trending toward financial distress."], ["2", "Cash flow forecasting for advisory clients", "Synthesizes historical QuickBooks data for each client to produce a 90-day cash flow forecast. Identifies which clients are likely to face cash flow stress in the next quarter — enabling the accounting firm to have a proactive conversation rather than a reactive one."], ["3", "Expense anomaly detection", "Monitors each client's expense categories for anomalies relative to their historical patterns and industry benchmarks. Identifies expense categories that are growing faster than revenue, vendors whose pricing is increasing faster than inflation, and cost categories that deserve management attention."], ["4", "AR/AP optimization intelligence", "Identifies which clients have deteriorating AR collection performance, which vendor payment practices are creating cash flow problems, and which working capital optimization opportunities exist across the accounting firm's client portfolio."], ["5", "Job profitability analysis (Enterprise clients)", "For QuickBooks Enterprise clients with job costing: synthesizes job-level profitability data to identify which job types, which customers, and which project managers consistently produce the highest margin — and which are systematically underperforming."], ["6", "Advisory client portfolio narrative", "Monthly synthesis of the accounting firm's entire QuickBooks client portfolio into an advisory narrative: which clients are growing, which are stable, which are declining, and which need proactive attention. Enables the accounting firm to prioritize their advisory outreach based on data, not intuition."]], "model": [["Pricing model", "This is a B2B2B model. You price to the accounting firm, not to individual business owners. $2,500-$4,000/mo for an accounting firm with 20-50 QuickBooks clients. The firm then bundles your synthesis into their advisory offering at $300-$800/client/month and captures the margin."], ["Scale pricing", "$4,000-$7,000/mo for accounting firms with 50-150 QuickBooks clients. The per-client marginal cost to you decreases as the portfolio grows — price accordingly."], ["Delivery", "Monthly portfolio narrative for the accounting firm partner or manager + per-client financial health report that the accountant delivers to each advisory client. The portfolio narrative is your product. The per-client reports are the accounting firm's product."], ["Onboarding", "QuickBooks API connection via Intuit's OAuth system. QuickBooks Online has one of the best-documented APIs in accounting software. Setup: 1-2 weeks per accounting firm. First insights at day 14."], ["Human layer", "One senior analyst per 10-15 accounting firm clients (note: each accounting firm may have 20-100 underlying QuickBooks clients). Accounting background required — former CPA, controller, or CFO who understands how to interpret financial statements in the context of specific business types."], ["Unit economics", "15 accounting firms x $3,500/mo = $52K MRR / $630K ARR. Lower per-client revenue than direct-to-business models, but each accounting firm client gives you access to 20-100 underlying businesses. The volume potential is enormous. Gross margin: 68-73%."]], "risks": ["This is a B2B2B model — not direct to business owners. The accounting firm is your client. Your success depends on the accounting firm's willingness and ability to sell advisory services to their clients. Vet your accounting firm clients for advisory orientation before you sign them.", "QuickBooks data quality varies by how well each business manages their books. Some QuickBooks files are beautifully maintained; others are a mess. Your synthesis quality depends on data quality. Include a data quality assessment in your onboarding — and design your intelligence products to flag data quality issues as part of the output.", "Intuit is building Intuit Assist and other AI features into QuickBooks. Watch what they build. Your moat is the accounting firm relationship and the human analyst who interprets the data in the context of the specific client's business — things Intuit cannot replicate as a software feature."], "ecosystem": [["Intuit Assist (native)", "Intuit's built-in AI assistant for QuickBooks", "Rapidly developing AI features within QuickBooks. Focused on transaction categorization, simple anomaly detection, and basic forecasting. Not synthesizing portfolio-level intelligence across multiple clients for accounting firms. The gap to what you deliver remains large."], ["Fathom, Spotlight Reporting, LivePlan", "Financial reporting and dashboard tools for accountants", "Produce formatted financial reports and dashboards for individual clients. Do not synthesize portfolio-level intelligence across an accounting firm's full client base. Good products — different category from what you are building."], ["QuickBooks ProAdvisor community", "Intuit's network of QuickBooks accounting professionals", "Your primary marketing channel. The ProAdvisor community has its own conference (QuickBooks Connect), regional events, and online forums. This is where your buyers gather."]], "gtm": [["QuickBooks Connect conference and ProAdvisor community", "QuickBooks Connect is Intuit's annual conference for ProAdvisors and accounting professionals. It is the single most concentrated gathering of your target buyers. The ProAdvisor community forums and local chapters are your year-round channel."], ["Accounting firm association channels", "AICPA (American Institute of CPAs), state CPA societies, and the American Institute of Professional Bookkeepers (AIPB) are your channels for reaching accounting professionals who serve QuickBooks clients."], ["Free portfolio financial health analysis as door-opener", "Offer a 30-day analysis of an accounting firm's QuickBooks client portfolio: which clients are showing cash flow stress signals, which have deteriorating AR collection performance, and which have expense anomalies worth a conversation. Most accounting firms find 3-5 clients who need proactive advisory conversations they were not having."], ["Intuit ProAdvisor program partner listing", "Intuit has a partner program for companies providing services to ProAdvisors. A partner listing generates inbound from accounting firms actively looking to build their advisory practice."], ["Position as the advisory infrastructure for accounting firms", "Your pitch to accounting firms is not analytics software — it is: 'We give you the AI-powered infrastructure to offer advisory services to your QuickBooks clients profitably, without hiring additional staff.' That framing speaks directly to the advisory practice growth aspiration that Intuit has been cultivating for years."]], "milestones": "<strong>Month 1-3:</strong> QuickBooks Online and Enterprise API integrations. Run free portfolio analyses for 3 accounting firms. Target first 3 accounting firm clients (each representing 20-50 underlying businesses). Target $8-12K MRR.<br><br><strong>Month 3-6:</strong> 8-10 accounting firm clients. Attend QuickBooks Connect or regional ProAdvisor event. Deliver first monthly portfolio narratives. Target $28-40K MRR.<br><br><strong>Month 6-9:</strong> 12-15 accounting firm clients. Apply for Intuit ProAdvisor partner program listing. Publish advisory practice playbook for accounting firms using your service. Target $45-60K MRR.<br><br><strong>Month 9-12:</strong> 18-22 accounting firm clients. Second analyst hire. Begin building referral pipeline from AICPA and state CPA society channels. Target $65-85K MRR."}, {"id": "salesforce", "rank": 9, "tier": 3, "name": "Salesforce", "industryTag": "Mid-market sales & revenue orgs", "encroach": "hi", "hook": "Pipeline, activity, and customer history data is rich. Mid-market Salesforce users have real budgets. The problem: Salesforce's own Einstein AI, Tableau, and a 1,000-vendor ecosystem are all trying to solve this.", "scores": {"data": 88, "gap": 75, "pays": 92, "community": 96, "api": 97}, "stats": [["150,000+", "Salesforce customers globally"], ["$10M-$200M", "Your ICP revenue range"], ["#1", "CRM market share globally"]], "sweet": "Mid-market B2B companies doing $10M-$200M in revenue that have been running Salesforce for at least 2 years and have a sales team of 10+ reps. Large enough to have meaningful pipeline and activity data. Small enough to lack a dedicated RevOps or analytics team that actively synthesizes that data.", "why": [["Salesforce captures everything but synthesizes nothing", "Salesforce's value proposition is that it captures every sales interaction, every opportunity, every customer touchpoint. The reality: most mid-market Salesforce orgs have inconsistent data entry, missing fields, and reps who skip activities. The synthesis gap is real but it starts with data quality — not just analysis."], ["The mid-market RevOps gap is enormous", "Enterprise companies have dedicated RevOps teams who synthesize Salesforce data continuously. Mid-market companies have one RevOps person (if they are lucky) who is overwhelmed with configuration, onboarding, and reporting requests. Nobody is doing proactive intelligence synthesis."], ["Salesforce is the most crowded platform to compete in — but the synthesis gap still exists", "The Salesforce ISV ecosystem has hundreds of analytics and intelligence tools. Your differentiator must be ruthlessly clear: you are a human analyst who reads their Salesforce data and tells them what it means — in plain language, without a dashboard, without a new login, without a new tool to learn."]], "captures": [{"n": "Pipeline & opportunity data", "body": "Every opportunity: stage, amount, close date, probability, activity history, competitive situation, and outcome. Every stage change, every win, every loss, every push. The complete commercial pipeline for the entire sales organization.", "chips": ["Opportunity pipeline", "Stage progression", "Win/loss data", "Competitive deals", "Forecast accuracy", "Deal velocity"]}, {"n": "Sales activity history", "body": "Every call logged, every email sent, every meeting booked, every demo delivered — for every rep, for every account. Salesforce's activity data captures the behaviors of the sales organization. What it does not do is synthesize which behaviors predict closed-won.", "chips": ["Call & email activity", "Meeting & demo data", "Multi-threading patterns", "Response time data", "Activity by rep", "Engagement by account"]}, {"n": "Customer & account data", "body": "Every customer's full interaction history, every product purchased, every support case opened, every renewal date, every contact hierarchy, and every relationship strength signal. Salesforce's customer data is the richest picture of the customer relationship available in any system.", "chips": ["Account engagement history", "Contact hierarchy", "Product & usage data", "Support case history", "Renewal pipeline", "Customer health signals"]}, {"n": "Forecast & quota data", "body": "Every rep's quota, every manager's forecast, every historical attainment record, every pipeline coverage ratio. Salesforce's forecasting module captures the revenue planning data of the organization — but most mid-market companies do not trust their Salesforce forecast because their data quality is too low.", "chips": ["Quota by rep", "Forecast accuracy", "Pipeline coverage", "Attainment history", "Commit vs. best case", "Territory performance"]}], "synth": [["1", "Pipeline health intelligence", "Synthesizes deal age, stage progression velocity, activity coverage, and competitive situation across the pipeline to identify which opportunities are at elevated risk of slipping or churning. Delivers a weekly pipeline health brief to the VP of Sales — not a dashboard they have to check, but a delivered narrative about what is happening in the pipeline."], ["2", "Rep behavior pattern analysis", "Identifies which rep behaviors — specific activity combinations, multi-threading patterns, demo-to-close timelines — most strongly predict closed-won outcomes in your specific sales environment. Enables evidence-based coaching conversations rather than intuition-based feedback."], ["3", "Win/loss pattern synthesis", "Synthesizes win/loss data, competitive deal outcomes, and stage progression patterns to identify which competitive situations you win, which you lose, and why. Surfaces the specific deal characteristics that predict competitive outcomes before the deal is decided."], ["4", "Customer health & expansion intelligence", "Synthesizes Salesforce's customer engagement data, support case history, product usage signals, and renewal pipeline to identify which customer relationships are at elevated churn risk — and which are ready for expansion conversations."], ["5", "Forecast accuracy improvement", "Synthesizes historical forecast accuracy, deal progression patterns, and rep-specific forecasting behaviors to identify which deals in the current forecast are overstated — and which are understated. Delivers a forecast confidence score that is more accurate than the rep's self-reported probability."], ["6", "Revenue performance narrative", "Monthly synthesis of the sales organization's performance into a VP of Sales and CEO-ready narrative: pipeline health, rep performance distribution, win/loss trends, forecast accuracy, and the 3 most important things to change in the next 30 days."]], "model": [["Entry price", "$5,000/mo for companies doing $10M-$50M in revenue with a 10-30 person sales team. At a $25M company, this is 0.24% of revenue — less than the fully loaded cost of one sales rep for one month."], ["Scale pricing", "$8,000-$15,000/mo for companies doing $50M-$200M with a 30-100 person sales team. Scales with deal complexity, sales team size, and the number of Salesforce objects requiring synthesis."], ["Delivery", "Weekly pipeline health flash + monthly revenue performance narrative + quarterly win/loss review. The weekly flash is your most important deliverable — a 1-page summary of what changed in the pipeline last week and what requires leadership attention."], ["Onboarding", "Salesforce REST API connection. Salesforce has one of the best-documented APIs in enterprise software. Setup: 1-2 weeks. First insights at day 14. Note: data quality assessment is always required — plan 1-2 weeks to identify and document the data quality issues before beginning synthesis."], ["Human layer", "One senior analyst per 8-10 Salesforce clients. Sales operations, revenue operations, or enterprise sales experience required. A former VP of Sales, Head of RevOps, or sales analytics leader who understands what a pipeline coverage ratio means in context of a specific sales environment is the ideal profile."], ["Unit economics", "12 clients x $8,000/mo = $96K MRR / $1.15M ARR. Salesforce clients who see value from your service are highly sticky — the intelligence becomes integral to the weekly sales leadership rhythm. Gross margin: 66-70%."]], "risks": ["The Salesforce ISV ecosystem is the most crowded room on this list. Clari, Gong, People.ai, Chorus, and dozens of other well-funded companies are all claiming to synthesize Salesforce data. Your positioning must be ruthlessly specific: you are not a tool — you are a human analyst who delivers intelligence. That distinction must be explicit in every piece of marketing.", "Salesforce data quality is almost always a problem. Most mid-market Salesforce orgs have inconsistent data entry, missing close dates, fields that nobody fills in, and stages that do not reflect real opportunity status. You must assess data quality before you begin synthesis and be transparent about how data quality limitations affect the confidence of your intelligence.", "The encroachment risk is the highest on this list. Salesforce is actively building Einstein AI and other synthesis capabilities into the core platform. If Salesforce ever builds a truly functional synthesis layer — not just dashboards — your value proposition for this platform weakens significantly. Salesforce intelligence is a legitimate business today. It may be a harder business in 3-5 years."], "ecosystem": [["Salesforce Einstein AI (native)", "Salesforce's built-in AI and analytics capabilities", "Building rapidly. Einstein Deal Insights, Einstein Conversation Insights, and Einstein Forecasting are all moving toward synthesis. The gap between what they build and what you deliver is narrowing faster than on any other platform on this list. Your moat must be the human analyst — loudly."], ["Clari, Gong, People.ai, Chorus", "Revenue intelligence platforms", "Well-funded competitors with hundreds of millions in VC backing. They produce dashboards and AI-powered insights. None of them have a human analyst who reads your specific data and delivers a narrative tailored to your specific situation. That is your differentiator."], ["Tableau, Einstein Analytics (Salesforce CRM Analytics)", "BI and analytics tools connected to Salesforce", "Require a trained analyst to build and maintain. Mid-market Salesforce customers often do not have that analyst. Produce dashboards that require interpretation. The synthesis gap remains open even when these tools are deployed."]], "gtm": [["Dreamforce (Salesforce's annual conference) is your awareness play — but it is very crowded", "Dreamforce is the world's largest software conference. Thousands of vendors are there. Do not expect to stand out without a very specific positioning. Instead, use Dreamforce for relationship-building with Salesforce's own AEs and customer success managers — not for customer acquisition."], ["Salesforce AE and CSM referral relationships", "Salesforce's own sales tea  which vendors are costing more per effective resolution than the invoice suggests, which properties are trending toward elevated capital expenditure needs."], ["The institutional property management market has a significant LP reporting burden that intelligence can directly address", "Institutional property management firms report performance to LP investors quarterly. Assembling that report is a significant administrative burden. An intelligence service that delivers a board- and LP-ready portfolio narrative monthly is addressing a real operational pain that goes beyond just analytics."]], "captures": [{"n": "Lease & tenant data", "body": "Every lease event across every unit — move-in, move-out, renewal, concession, delinquency, and notice to vacate. Every tenant's full occupancy history, payment history, and service interaction history. Yardi captures the most comprehensive tenant lifecycle data of any property management platform.", "chips": ["Lease lifecycle data", "Renewal & concession history", "Tenant payment history", "Notice to vacate tracking", "Occupancy trends", "Rent roll data"]}, {"n": "Maintenance & work order data", "body": "Every work order across every unit and every property — category, priority, assigned vendor, time to complete, cost, callback frequency, and resident satisfaction rating. Yardi's maintenance module captures the operational performance of every vendor relationship in extraordinary detail.", "chips": ["Work order history", "Vendor performance", "Callback frequency", "Maintenance cost by system", "Response time tracking", "Resident satisfaction"]}, {"n": "Financial performance data", "body": "Every income statement, every expense allocation, every budget vs. actual variance, every capital expenditure, every operating expense by category — per unit, per property, and per portfolio. Yardi's financial reporting is the most granular of any property management platform.", "chips": ["NOI by property", "Operating expense by category", "Budget vs. actual", "CapEx tracking", "CAM reconciliation", "Revenue per unit"]}, {"n": "Utility & compliance data", "body": "Utility billing by unit and by property — electricity, gas, water, and sewer. Every compliance inspection record, every code violation, every certificate of occupancy status, every insurance certificate. Yardi captures regulatory compliance data that most property management firms never synthesize into risk intelligence.", "chips": ["Utility consumption by unit", "RUBS allocation data", "Compliance inspections", "Code violations", "Insurance certificates", "Regulatory status"]}], "synth": [["1", "Lease renewal risk intelligence", "Synthesizes maintenance request patterns, rent-to-market ratio, tenant payment history, unit condition history, and resident satisfaction data into a 90-day renewal risk score for every lease in the portfolio. Identifies which residents are at elevated non-renewal risk with enough lead time to intervene."], ["2", "Vendor performance intelligence", "Synthesizes work order completion time, callback rate, resident satisfaction impact, and invoice cost for every vendor across the entire portfolio into an evidence-based vendor scorecard. Identifies which vendor relationships are delivering true value vs. which look cost-effective on the invoice but are expensive in total cost of resolution."], ["3", "NOI variance analysis", "Identifies which specific operating cost categories are driving NOI divergence between similar properties. Surfaces properties with above-average utility cost, turnover cost, or vendor expense — and the specific drivers behind each variance."], ["4", "Capital expenditure risk intelligence", "Synthesizes maintenance request escalation patterns, equipment age data, and utility consumption anomalies to identify which properties are trending toward significant capital expenditure events 6-12 months before they become emergency repairs. Enables proactive capital planning."], ["5", "Portfolio performance narrative for LP reporting", "Monthly synthesis of the entire portfolio's performance into an LP- and board-ready narrative: occupancy trends, renewal performance, operating cost trajectory, NOI per unit trends, and capital risk concentration. Replaces the manual data assembly that consumes 20-40 hours before each quarterly LP reporting cycle."], ["6", "Utility anomaly detection", "Monitors utility consumption by property and by unit for anomalies indicating equipment failure, leak events, or unusual consumption patterns. Delivers a weekly anomaly alert for any property showing consumption 20%+ above seasonal baseline — before the utility bill arrives."]], "model": [["Entry price", "$0.50-$1.00 per unit per month. A 5,000-unit portfolio pays $2,500-$5,000/mo. A 25,000-unit portfolio pays $12,500-$25,000/mo. A 100,000-unit portfolio pays $50,000-$100,000/mo. Per-unit pricing maps directly to how institutional property management operators think about operating cost."], ["Scale pricing", "Rate decreases significantly at scale: >50,000 units: $0.30-$0.50/unit/mo. Large portfolios get a materially lower rate because the marginal cost of synthesis scales with data volume — not linearly with unit count."], ["Delivery", "Monthly portfolio intelligence brief for the executive team + weekly anomaly alerts + quarterly LP-ready narrative. The quarterly LP narrative is your highest-value deliverable for institutional clients — it saves 20-40 hours of management time and produces a better outcome than the manual process."], ["Onboarding", "Yardi Voyager API connection via Yardi's Partner Connect program. Yardi's API is more restrictive than most platforms — you must go through their Partner Connect program and get formal approval before accessing client data. Plan 6-10 weeks for the first integration. This is the moat: once you have done it, competitors face the same barrier."], ["Human layer", "One senior analyst per 5-7 Yardi Voyager clients (note: these clients have much larger rformance improvement. A referral relationship with 3-5 of these firms generates warm introductions to qualified prospects with large Yardi portfolios."], ["Free portfolio utility anomaly scan as door-opener", "Pull 12 months of Yardi utility data for a portfolio of 5-10 properties and identify any consumption anomalies. Most large portfolios have at least 2-3 undetected equipment issues or leaks generating significant excess utility cost. A specific dollar figure of excess cost identified in a free scan is your most compelling proof of value to an institutional property manager."]], "milestones": "<strong>Month 1-3:</strong> Complete Yardi Partner Connect integration program. Hire institutional real estate experienced analyst. Run 1-2 free utility anomaly scans for large portfolios. Target first 2 paid clients.<br><br><strong>Month 3-6:</strong> 4-5 clients (each 5,000-25,000 units). Deliver first monthly portfolio intelligence briefs and quarterly LP narratives. Build NMHC or YASC presence. Target $40-70K MRR.<br><br><strong>Month 6-9:</strong> 6-8 clients. Attend YASC. Publish benchmark report on institutional multifamily operational performance. Target $75-110K MRR.<br><br><strong>Month 9-12:</strong> 8-12 clients. Second analyst hire. Build Yardi Partner Connect marketplace listing. Target $110-160K MRR."}];

const pages = ['home','ind','plat','idet','pdet','strat'];
function show(id){
  pages.forEach(p=>{
    document.getElementById('pg-'+p).classList.toggle('on',p===id);
  });
  document.querySelectorAll('.nav').forEach(n=>{
    n.classList.toggle('on', n.dataset.p===id);
  });
  window.scrollTo(0,0);
}
document.querySelectorAll('.nav').forEach(n=>n.addEventListener('click',()=>show(n.dataset.p)));

// ── Score bars ───────────────────────────────────────────────
const SCORE_COLORS = {data:'#28c48a',gap:'#5b8ef8',pays:'#9d8ff5',density:'#f0a832',community:'#f0a832',api:'#f07060'};
function scoreBars(scores){
  return Object.entries(scores).map(([k,v])=>
    `<div class="sr"><span class="sl">${k}</span><div class="st"><div class="sf" style="--w:${v}%;background:${SCORE_COLORS[k]||'#5b8ef8'}"></div></div></div>`
  ).join('');
}

// ── Tags ─────────────────────────────────────────────────────
function encroachTag(e){
  if(!e) return '';
  const map={low:'t-lo',med:'t-md',high:'t-hi'};
  return `<span class="tag ${map[e]||'t-df'}">${e} encroach</span>`;
}

// ── TOGGLE EXPAND ────────────────────────────────────────────
function toggleRC(el, id, type){
  if(event.target.classList.contains('go-btn')) return;
  el.classList.toggle('open');
  // trigger score bar animation
  el.querySelectorAll('.sf').forEach(b=>{ b.style.width='0'; setTimeout(()=>b.style.width=b.style.getPropertyValue('--w'),50); });
}

// ── OPEN DETAIL ──────────────────────────────────────────────
function openDetail(id, type){
  if(type==='ind'){
    const ind = IND.find(i=>i.id===id);
    renderIndDetail(ind);
    show('idet');
  } else {
    const pl = PLAT.find(p=>p.id===id);
    renderPlatDetail(pl);
    show('pdet');
  }
}

    <div class="ph-title">${pl.name} ${encroachTag(pl.encroach)}</div>
    <div class="ph-desc">${pl.hook}</div>
    <div class="tabs">${tabs.map((t,i)=>`<div class="tab${i===0?' on':''}" onclick="switchTab2('#pg-pdet',${i})">${t}</div>`).join('')}</div>`;

  // Tab 0: Overview
  html += `<div class="tp on">
    <div class="sg">${pl.stats.map(([n,l])=>`<div class="sb2"><span class="sn">${n}</span><div class="sl2">${l}</div></div>`).join('')}</div>
    <div class="sec">Sweet spot</div><div class="ab">${pl.sweet}</div>
    <div class="sec">Why now</div>
    ${pl.why.map(([t,b])=>`<div class="cc"><div class="ct">${t}</div><div class="cb">${b}</div></div>`).join('')}
  </div>`;

  // Tab 1: Data Captured
  html += `<div class="tp">
    <div class="sec">What the platform captures</div>
    ${pl.captures.map(c=>`<div class="cc">
      <div class="ct">${c.n}</div>
      <div class="cb">${c.body}</div>
      <div class="chips">${c.chips.map(ch=>`<span class="chip">${ch}</span>`).join('')}</div>
    </div>`).join('')}
  </div>`;

  // Tab 2: Synthesis
  html += `<div class="tp">
    <div class="sec">Intelligence products you deliver</div>
    ${pl.synth.map(([n,t,b])=>`<div class="cc"><div class="ct"><strong>${n}. ${t}</strong></div><div class="cb">${b}</div></div>`).join('')}
  </div>`;

  // Tab 3: Business Model
  html += `<div class="tp">
    <table class="mt">${pl.model.map(([l,v])=>`<tr><td>${l}</td><td>${v}</td></tr>`).join('')}</table>
    <div class="sec">Risks & watch-outs</div>
    ${pl.risks.map(r=>`<div class="ab w">${r}</div>`).join('')}
    <div class="sec">Milestones</div>
    <div class="ab">${pl.milestones}</div>
  </div>`;

  // Tab 4: Ecosystem
  html += `<div class="tp">
    <div class="sec">Competitive ecosystem</div>
    <table class="cot">
      <thead><tr><th>Player</th><th>What they do</th><th>Gap you exploit</th></tr></thead>
      <tbody>${pl.ecosystem.map(([n,w,g])=>`<tr><td>${n}</td><td>${w}</td><td class="t-r">${g}</td></tr>`).join('')}</tbody>
    </table>
  </div>`;

  // Tab 5: GTM
  html += `<div class="tp">
    <div class="sec">Go-to-market playbook</div>
    ${pl.gtm.map(([t,d],i)=>`<div class="gs"><div class="gn">${i+1}</div><div><div class="gtt">${t}</div><div class="gd">${d}</div></div></div>`).join('')}
  </div>`;

  document.getElementById('pg-pdet').innerHTML = html;
}

// ── TAB SWITCHING ────────────────────────────────────────────
function switchTab(el, i){
  const pg = el.closest('.pg');
  pg.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('on',j===i));
  pg.querySelectorAll('.tp').forEach((t,j)=>t.classList.toggle('on',j===i));
}
function switchTab2(sel, i){
  const pg = document.querySelector(sel);
  if(!pg) return;
  pg.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('on',j===i));
  pg.querySelectorAll('.tp').forEach((t,j)=>t.classList.toggle('on',j===i));
}
